apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
spec:
  releaseName: envoy-gateway
  driftDetection:
    mode: enabled
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
    namespace: envoy-gateway-system
  interval: 10m0s
  install:
    # CRDs come from the dedicated `crds-envoy-gateway` kustomize
    # bundle under `crds/base/envoy-gateway/` (see commit history).
    # The chart's bundled gateway-api CRDs are at v1.4.1 and conflict
    # with the cluster-wide v1.5.1 install (its `safe-upgrades`
    # ValidatingAdmissionPolicy refuses CRD downgrades), and a
    # gateway-crds-helm release would exceed the 1 MiB Helm release
    # Secret limit.
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
  values:
    # AI Gateway integration — Envoy Gateway calls out to the AI Gateway
    # controller as an Extension Server to fine-tune xDS for AIGatewayRoute
    # → AIServiceBackend → vLLM Service translation. Values mirror the
    # upstream `manifests/envoy-gateway-values.yaml` from
    # envoyproxy/ai-gateway@v0.5.0; see design §3.
    config:
      envoyGateway:
        extensionApis:
          # Required: AIServiceBackend.backendRef → gateway.envoyproxy.io Backend.
          enableBackend: true
          # Recommended for forward-compat (xDS patching).
          enableEnvoyPatchPolicy: true
        extensionManager:
          # Delegate InferencePool backendRefs to the AI Gateway extension server
          # (SPEC-004). Without this, Envoy Gateway never learns that InferencePool
          # is a delegable backend kind and falls back to its BUILT-IN group check,
          # which hard-rejects anything outside core / multicluster.x-k8s.io /
          # gateway.envoyproxy.io (internal/gatewayapi/validate.go
          # validateBackendRefGroup — envoyproxy/gateway v1.8.2 has ZERO files
          # mentioning "inference"). The generated HTTPRoute then reports:
          #
          #   ResolvedRefs=False (InvalidKind): Group is invalid, only the core API
          #   group ..., multicluster.x-k8s.io and gateway.envoyproxy.io are supported.
          #
          # …and Envoy installs a direct_response, so EVERY request through the pool
          # returns HTTP 500 with `upstream_cluster: None` — no cluster is ever
          # created. Confusingly the control plane looks healthy: the InferencePool
          # reports Accepted=True/ResolvedRefs=True (the ai-gateway controller
          # reconciles the CR itself) and the AIGatewayRoute reports Accepted=True.
          # Only the GENERATED HTTPRoute carries the real error.
          #
          # Group/kind/version must match what the inferencepool chart creates
          # (inference.networking.k8s.io/v1). Source: envoyproxy/ai-gateway v1.0.0
          # examples/inference-pool/envoy-gateway-values-addon.yaml.
          backendResources:
            - group: inference.networking.k8s.io
              kind: InferencePool
              version: v1
          hooks:
            xdsTranslator:
              translation:
                listener: {includeAll: true}
                route: {includeAll: true}
                cluster: {includeAll: true}
                secret: {includeAll: true}
              post:
                - Translation
                - Cluster
                - Route
          service:
            fqdn:
              hostname: ai-gateway-controller.envoy-ai-gateway-system.svc.cluster.local
              port: 1063
    deployment:
      envoyGateway:
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
