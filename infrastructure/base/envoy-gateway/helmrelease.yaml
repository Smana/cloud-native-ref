apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
spec:
  releaseName: envoy-gateway
  driftDetection:
    mode: enabled
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
    namespace: envoy-gateway-system
  interval: 10m0s
  install:
    # CRDs come from the dedicated `crds-envoy-gateway` kustomize
    # bundle under `crds/base/envoy-gateway/` (see commit history).
    # The chart's bundled gateway-api CRDs are at v1.4.1 and conflict
    # with the cluster-wide v1.5.1 install (its `safe-upgrades`
    # ValidatingAdmissionPolicy refuses CRD downgrades), and a
    # gateway-crds-helm release would exceed the 1 MiB Helm release
    # Secret limit.
    crds: Skip
    remediation:
      retries: 3
  upgrade:
    crds: Skip
  values:
    # AI Gateway integration — Envoy Gateway calls out to the AI Gateway
    # controller as an Extension Server to fine-tune xDS for AIGatewayRoute
    # → AIServiceBackend → vLLM Service translation. Values mirror the
    # upstream `manifests/envoy-gateway-values.yaml` from
    # envoyproxy/ai-gateway@v0.5.0; see design §3.
    config:
      envoyGateway:
        extensionApis:
          # Required: AIServiceBackend.backendRef → gateway.envoyproxy.io Backend.
          enableBackend: true
          # Recommended for forward-compat (xDS patching).
          enableEnvoyPatchPolicy: true
        extensionManager:
          # Envoy Gateway has no native InferencePool support — it delegates the kind
          # to the AI Gateway extension server, and this is what performs that
          # delegation. Unset, its built-in backendRef group check rejects anything
          # outside core / multicluster.x-k8s.io / gateway.envoyproxy.io, the generated
          # HTTPRoute goes ResolvedRefs=False (InvalidKind), and every request through
          # the pool 500s — while the InferencePool and AIGatewayRoute both still report
          # Accepted=True, so only the generated HTTPRoute shows the error.
          #
          # Group/kind/version must match what the inferencepool chart creates. Source:
          # envoyproxy/ai-gateway v1.0.0 examples/inference-pool/envoy-gateway-values-addon.yaml.
          backendResources:
            - group: inference.networking.k8s.io
              kind: InferencePool
              version: v1
          hooks:
            xdsTranslator:
              translation:
                listener: {includeAll: true}
                route: {includeAll: true}
                cluster: {includeAll: true}
                secret: {includeAll: true}
              post:
                - Translation
                - Cluster
                - Route
          service:
            fqdn:
              hostname: ai-gateway-controller.envoy-ai-gateway-system.svc.cluster.local
              port: 1063
    deployment:
      envoyGateway:
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 512Mi
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
