# GatewayClass for the AI gateway data plane.
#
# Coexists with Cilium's GatewayClasses (`cilium`, `cilium-tailscale`).
# The controllerName is Envoy Gateway's own; the class name is a
# logical handle that the Gateway resource references.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-ai-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
