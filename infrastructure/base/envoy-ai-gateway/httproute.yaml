# Public-facing HTTPRoute — exposes the AI Gateway data plane via the
# existing Tailscale gateway under llm.${private_domain_name}. Replaces
# the legacy apps/base/ai/llm/httproute-router.yaml that pointed at
# the Semantic Router directly. The AIGatewayRoute terminates client
# traffic and dispatches directly to each model's per-claim Backend
# (FQDN of the vLLM Service) — direct routing only since SPEC-001
# removed the KEDA HTTP add-on from the data path.
#
# `model: MoM` is resolved earlier in the filter chain, not by any extension
# server: the Semantic Router runs as an ext_proc gRPC filter at
# http_filters[0] (see envoypatchpolicy-semantic-router.yaml) and rewrites
# `body.model` in place. The AI Gateway's own extproc then derives
# `x-ai-eg-model` from the rewritten body, so the header-match resolves
# normally with no MoM-specific rule.
#
# **Lives in envoy-gateway-system (not envoy-ai-gateway-system)** so
# the backendRef can stay in-namespace and avoid a ReferenceGrant.
# Envoy Gateway controller spawns the data-plane Service (`ai-gateway`,
# pinned via EnvoyProxy.spec.provider.kubernetes.envoyService.name in
# envoyproxy.yaml) into its own namespace, regardless of where the
# parent Gateway lives — so the Service is here, and the route follows
# it. The Tailscale Gateway's `allowedRoutes` selector includes this
# namespace.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-gateway
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: platform-tailscale-general
      namespace: infrastructure
  hostnames:
    - "llm.${private_domain_name}"
  rules:
    - backendRefs:
        - name: ai-gateway
          port: 8080
