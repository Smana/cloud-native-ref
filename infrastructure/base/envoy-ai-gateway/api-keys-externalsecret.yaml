---
# API keys consumed by the SecurityPolicy in this directory. Source of
# truth: AWS Secrets Manager at `platform/llm/api-keys`, a JSON object
# with one entry per client identity:
#
#   {
#     "openwebui_apikey":  "sk-...",
#     "promptfoo_apikey":  "sk-..."
#   }
#
# Rotation: change the value in AWS SM; ESO refreshes the rendered
# Secret every 1h. The SecurityPolicy reload picks up the new value
# automatically (Envoy Gateway watches the Secret).
#
# The rendered Secret stores each value as the **raw** API key — no
# `Bearer ` prefix. When `extractFrom.headers: ["Authorization"]` is
# set on `apiKeyAuth`, Envoy Gateway strips the auth scheme before
# comparison, so a stored "Bearer sk-..." would never match the
# extracted "sk-..." (gateway docs / v1.7 apikey-auth task).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-gateway-api-keys
  namespace: envoy-ai-gateway-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: clustersecretstore
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: ai-gateway-api-keys
    template:
      type: Opaque
      data:
        # Each key here is the SecurityPolicy "client ID" that
        # apiKeyAuth surfaces via ForwardClientIDHeader if enabled.
        openwebui: "{{ .openwebui_apikey }}"
        promptfoo: "{{ .promptfoo_apikey }}"
  data:
    - secretKey: openwebui_apikey  # pragma: allowlist secret
      remoteRef:
        key: platform/llm/api-keys
        property: openwebui_apikey  # pragma: allowlist secret
    - secretKey: promptfoo_apikey  # pragma: allowlist secret
      remoteRef:
        key: platform/llm/api-keys
        property: promptfoo_apikey  # pragma: allowlist secret
