# Public gateway for the FEW endpoints that must be reachable from the internet.
# Deliberately single-purpose: today its only consumer is runlore's Slack
# interactivity callback (POST /slack/interactions) — Slack posts button clicks /
# reactions from its own servers, so a private (Tailscale) gateway cannot carry
# them. Exposure is bounded by construction:
#   - allowedRoutes restricts attachment to the runlore namespace only;
#   - the runlore HTTPRoute matches exactly ONE path+method (everything else on
#     the hostname is a gateway 404);
#   - every request that reaches the app is HMAC-verified against the Slack
#     signing secret (±5min replay window) — see runlore's docs/security-model.md.
# TLS via cert-manager (letsencrypt-prod), internet-facing NLB.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-public
  labels:
    external-dns: enabled  # required by external-dns's --gateway-label-filter
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
      service.beta.kubernetes.io/aws-load-balancer-name: "ogenki-platform-public-gateway"
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: instance
      service.beta.kubernetes.io/aws-load-balancer-type: "external"
  listeners:
    - name: https
      hostname: "*.${domain_name}"
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - runlore
      tls:
        mode: Terminate
        certificateRefs:
          - name: platform-public-tls
