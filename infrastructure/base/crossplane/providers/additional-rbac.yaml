---
# ClusterRole for aggregating permissions to Crossplane in order to manage CNPG resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  namespace: crossplane-system
  name: cnpg:aggregate-to-crossplane
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
rules:
  #  Manage CNPG PostgreSQL databases, clusters, roles, and scheduled backups
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["databases", "clusters", "roles", "scheduledbackups"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  namespace: crossplane-system
  name: external-secrets:aggregate-to-crossplane # pragma: allowlist secret
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
rules:
  # Manage external secrets
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["*"]
---
# ClusterRole for aggregating permissions to Crossplane in order to manage Atlas migrations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  namespace: crossplane-system
  name: atlas:aggregate-to-crossplane
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
rules:
  # Manage Atlas schema migrations
  - apiGroups: ["db.atlasgo.io"]
    resources: ["atlasmigrations", "atlasmigrations/status"]
    verbs: ["*"]
---
# Thats probably a workaround because it doesn't seem to work without it
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  namespace: crossplane-system
  name: crossplane:aws-upbound-provider
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
rules:
  # Manage AWS provider configs
  - apiGroups:
      - aws.m.upbound.io
    resources:
      - clusterproviderconfigs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - aws.m.upbound.io
    resources:
      - providerconfigusages
    verbs:
      - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane:aws-upbound
subjects:
  - kind: ServiceAccount
    name: provider-aws
    namespace: crossplane-system
roleRef:
  kind: ClusterRole
  name: crossplane:aws-upbound-provider
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole for aggregating App composition resource permissions to Crossplane
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: app-composition:aggregate-to-crossplane
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
rules:
  # Core Kubernetes resources created by App composition
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/status"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["services", "services/status", "persistentvolumeclaims", "persistentvolumeclaims/status"]
    verbs: ["*"]
  # CronJob for type=cron workloads (SPEC-007)
  - apiGroups: ["batch"]
    resources: ["cronjobs", "cronjobs/status"]
    verbs: ["*"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers", "horizontalpodautoscalers/status"]
    verbs: ["*"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets", "poddisruptionbudgets/status"]
    verbs: ["*"]
  # Gateway API resources
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "gateways/status", "httproutes", "httproutes/status"]
    verbs: ["*"]
  # Cilium network policies
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies", "ciliumnetworkpolicies/status"]
    verbs: ["*"]
  # Flux HelmRelease for kvStore
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases", "helmreleases/status"]
    verbs: ["*"]
  # Flux GitRepository and Kustomization for Atlas migrations
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories", "gitrepositories/status"]
    verbs: ["*"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations", "kustomizations/status"]
    verbs: ["*"]
  # VictoriaMetrics operator resources for observability
  - apiGroups: ["operator.victoriametrics.com"]
    resources: ["vmservicescrapes", "vmservicescrapes/status", "vmrules", "vmrules/status"]
    verbs: ["*"]
---
# ClusterRole for aggregating InferenceService composition resource permissions
# to Crossplane. Adds the kinds the App composition aggregate doesn't cover —
# KEDA ScaledObject, batch/Job (one-shot weights preload), and the Envoy
# AI Gateway routing kinds (SPEC-002: Backend, AIServiceBackend,
# AIGatewayRoute rendered per claim when spec.gateway.enabled).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inference-service:aggregate-to-crossplane
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
  annotations:
    # Crossplane aggregated ClusterRoles need full lifecycle verbs on the
    # CRDs the composition manages — same pattern as every sibling aggregate
    # role in this file. Narrowing the verbs would break composition
    # reconciliation (no create/update/patch/delete).
    checkov.io/skip1: CKV_K8S_49=Aggregated ClusterRole for Crossplane composition; wildcard verbs match the established pattern across additional-rbac.yaml
rules:
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects", "scaledobjects/status"]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: ["jobs", "jobs/status"]
    verbs: ["*"]
  - apiGroups: ["gateway.envoyproxy.io"]
    resources: ["backends", "backends/status"]
    verbs: ["*"]
  - apiGroups: ["aigateway.envoyproxy.io"]
    resources: ["aigatewayroutes", "aigatewayroutes/status", "aiservicebackends", "aiservicebackends/status"]
    verbs: ["*"]
  # SPEC-004: the endpointPicker path renders a per-claim Flux HelmRelease
  # (chart `inferencepool`) plus its own CiliumNetworkPolicy + VMServiceScrape
  # (both already covered by the cilium.io / operator.victoriametrics.com
  # grants on app-composition:aggregate-to-crossplane, which aggregates into
  # the same crossplane SA). The chart — NOT the composition directly —
  # creates the InferencePool CR + EPP Deployment/Service, so `inferencepools`
  # is deliberately NOT granted here (CL-2/FR-009: the chart's own
  # namespace-scoped RBAC owns them). Only `helmreleases` is a new kind the
  # composition renders itself, so it is the sole SPEC-004 delta.
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases", "helmreleases/status"]
    verbs: ["*"]
