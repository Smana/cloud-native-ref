apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: inferenceservices.cloud.ogenki.io
spec:
  group: cloud.ogenki.io
  scope: Namespaced
  names:
    kind: InferenceService
    plural: inferenceservices
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      additionalPrinterColumns:
        - name: SERVED MODELS
          type: string
          jsonPath: .status.servedModelsSummary
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-validations:
                - rule: "!has(self.scaling) || !has(self.scaling.minReplicas) || !has(self.scaling.maxReplicas) || self.scaling.minReplicas <= self.scaling.maxReplicas"
                  message: "scaling.minReplicas must be <= maxReplicas"
                - rule: "!has(self.route) || !self.route.enabled || has(self.route.hostname)"
                  message: "route.hostname is required when route is enabled"
                - rule: "!has(self.gateway) || !has(self.gateway.canaries) || self.gateway.enabled"
                  message: "gateway.canaries requires gateway.enabled to be true"
                - rule: "!has(self.gateway) || !has(self.gateway.canaries) || (has(self.loraAdapters) && self.gateway.canaries.all(c, self.loraAdapters.exists(a, a.name == c.adapter)))"
                  message: "every gateway.canaries[].adapter must match a loraAdapters[].name entry"
                - rule: "!has(self.gateway) || !has(self.gateway.canaries) || self.gateway.canaries.all(c, self.gateway.canaries.filter(x, x.adapter == c.adapter).size() == 1)"
                  message: "gateway.canaries[].adapter names must be distinct"
                - rule: "!has(self.gateway) || !has(self.gateway.canaries) || self.gateway.canaries.map(c, c.weightPercent).sum() <= 99"
                  message: "gateway.canaries[].weightPercent must sum to <= 99 (the base model always retains traffic)"
                # SPEC-004 (FR-002, CL-1): endpointPicker only alters gateway
                # routing, so it requires gateway.enabled.
                - rule: "!has(self.gateway) || !has(self.gateway.endpointPicker) || !self.gateway.endpointPicker.enabled || self.gateway.enabled"
                  message: "gateway.endpointPicker.enabled requires gateway.enabled to be true"
                # SPEC-004 (FR-005, CL-4): an InferencePool backendRef carries
                # neither weight nor modelNameOverride and only one InferencePool
                # is allowed per rule, so weighted LoRA canaries and InferencePool
                # routing are mutually exclusive per claim in this version.
                - rule: "!has(self.gateway) || !has(self.gateway.endpointPicker) || !self.gateway.endpointPicker.enabled || !has(self.gateway.canaries) || self.gateway.canaries.size() == 0"
                  message: "gateway.endpointPicker.enabled is mutually exclusive with gateway.canaries[] — InferencePool backendRefs support neither weight nor modelNameOverride; drop the canaries or disable endpointPicker"
                # engineArgs reserved-flag denylist (SPEC-003) — one rule per
                # composition-managed flag. Lockstep with kcl/inference-service/main.k
                # is asserted by main_test.k:test_engine_args_denylist_lockstep. The
                # 'a != "--X" && !a.startsWith("--X=")' form is used instead of
                # split("=")[0] to avoid depending on the CEL strings extension.
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a.startsWith("--"))'
                  message: "each spec.engineArgs entry must be a single token starting with '--' (use --flag=value, not --flag value)"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--model" && !a.startsWith("--model="))'
                  message: "--model is composition-managed; use spec.model.repository (composition sets the local weights path)"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--served-model-name" && !a.startsWith("--served-model-name="))'
                  message: "--served-model-name is composition-managed; the served model name is the claim name (metadata.name)"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--max-model-len" && !a.startsWith("--max-model-len="))'
                  message: "--max-model-len is composition-managed; use spec.model.contextWindow"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--max-num-seqs" && !a.startsWith("--max-num-seqs="))'
                  message: "--max-num-seqs is composition-managed; use spec.model.maxNumSeqs (it is the KEDA scaling denominator)"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--gpu-memory-utilization" && !a.startsWith("--gpu-memory-utilization="))'
                  message: "--gpu-memory-utilization is composition-managed (fixed at 0.92)"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--quantization" && !a.startsWith("--quantization="))'
                  message: "--quantization is composition-managed; use spec.model.quantization"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--enable-prefix-caching" && !a.startsWith("--enable-prefix-caching="))'
                  message: "--enable-prefix-caching is composition-managed; use spec.cache.prefixCache.enabled"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--cpu-offload-gb" && !a.startsWith("--cpu-offload-gb="))'
                  message: "--cpu-offload-gb is composition-managed; use spec.cache.kvOffload.{enabled,sizeGB}"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--enable-auto-tool-choice" && !a.startsWith("--enable-auto-tool-choice="))'
                  message: "--enable-auto-tool-choice is composition-managed; use spec.model.toolCallParser"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--tool-call-parser" && !a.startsWith("--tool-call-parser="))'
                  message: "--tool-call-parser is composition-managed; use spec.model.toolCallParser"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--enable-lora" && !a.startsWith("--enable-lora="))'
                  message: "--enable-lora is composition-managed; use spec.loraAdapters"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--max-loras" && !a.startsWith("--max-loras="))'
                  message: "--max-loras is composition-managed; use spec.loraAdapters"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--max-lora-rank" && !a.startsWith("--max-lora-rank="))'
                  message: "--max-lora-rank is composition-managed; use spec.loraAdapters (rank fixed at 64)"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--lora-modules" && !a.startsWith("--lora-modules="))'
                  message: "--lora-modules is composition-managed; use spec.loraAdapters"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--port" && !a.startsWith("--port="))'
                  message: "--port is composition-managed; serving-contract flag; the vLLM port is fixed at 8000 (Service/probes/Backend depend on it)"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--host" && !a.startsWith("--host="))'
                  message: "--host is composition-managed; serving-contract flag — the listen address is fixed (Service, probes and gateway Backend depend on it)"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--load-format" && !a.startsWith("--load-format="))'
                  message: "--load-format is composition-managed; use spec.model.streaming.enabled"
                - rule: '!has(self.engineArgs) || self.engineArgs.all(a, a != "--model-loader-extra-config" && !a.startsWith("--model-loader-extra-config="))'
                  message: "--model-loader-extra-config is composition-managed; use spec.model.streaming.concurrency"
              properties:
                model:
                  type: object
                  description: Model identity and load configuration
                  properties:
                    repository:
                      type: string
                      description: HuggingFace model repository (e.g., Qwen/Qwen3-8B)
                    revision:
                      type: string
                      description: Model commit / tag for reproducibility
                      default: main
                    quantization:
                      type: string
                      description: Quantization scheme passed to vLLM
                      enum: ["fp16", "fp8", "awq", "gptq", "bitsandbytes"]
                      default: fp16
                    contextWindow:
                      type: integer
                      description: Max context length (--max-model-len)
                      minimum: 1024
                      default: 4096
                    maxNumSeqs:
                      type: integer
                      description: |
                        vLLM `--max-num-seqs` — the maximum number of
                        concurrent in-flight requests per replica
                        (continuous-batching cap). Reasonable values
                        scale with GPU VRAM: 32-64 on L4 (24GB), 128
                        on A10G/A100. Used by the autoscaler to
                        compute `num_requests_running / maxNumSeqs`
                        as the leading scale-up signal.
                      minimum: 1
                      default: 64
                    toolCallParser:
                      type: string
                      description: |
                        vLLM tool-call parser name. Optional. When set,
                        vLLM is started with `--enable-auto-tool-choice
                        --tool-call-parser <value>`. Required for OpenAI
                        function-calling clients (OpenCode, Continue
                        agentic, OpenAI SDK with `tools[]`); without it
                        vLLM 400s on those requests with "Bad Request:
                        autotool".

                        Common values:
                        - `hermes` — Qwen2.5/Qwen3 family
                        - `llama3_json` — Llama 3.x
                        - `phi4_mini_json` — Phi-4-mini
                        - `mistral` — Mistral / Mixtral
                        Leave unset for FIM/Base models that don't do tools.
                    preload:
                      type: object
                      description: |
                        CL-3 (rec A): when enabled, the composition renders a
                        Job that downloads weights from HuggingFace directly
                        into the shared S3 Files mount at
                        /models/<subPath>/<revision>/. Per ADR-0004 the FS is
                        S3 Files (POSIX), so preload Job and serving
                        Deployment share one persistent mount — no aws s3
                        sync, no init-container.
                      properties:
                        enabled:
                          type: boolean
                          default: false
                    streaming:
                      type: object
                      description: |
                        SPEC-005 (phase 1): opt-in Run:ai Model Streamer
                        load-format. When enabled, vLLM loads weights with
                        `--load-format runai_streamer`, reading the existing
                        PVC-mounted safetensors at /models/<revision>
                        concurrently and streaming tensors straight to GPU —
                        cutting the pod-ready → first-token cold-start window.
                        No storage change: the streamer reads the same local
                        path the default loader uses, adds no pod / init
                        container / IAM role / S3 bucket / PVC / Secret, and
                        does not touch the preload Job, autoscaling, or gateway
                        routing. The streamer binary is already bundled in
                        vllm/vllm-openai:v0.8.5 (no image bump). Off by default;
                        an unset block renders no streamer flags (byte-identical
                        to the default loader).
                      properties:
                        enabled:
                          type: boolean
                          description: |
                            Switch weight loading to `--load-format
                            runai_streamer`. Default false (opt-in).
                          default: false
                        concurrency:
                          type: integer
                          description: |
                            Number of concurrent read workers the streamer uses
                            to read safetensors chunks. Optional. When set, the
                            composition adds `--model-loader-extra-config` with a
                            JSON object carrying `{"concurrency": N}`. When
                            unset, no extra-config arg is rendered. Higher values
                            trade CPU + memory for load throughput.
                          minimum: 1
                          maximum: 64
                  required:
                    - repository
                engineArgs:
                  type: array
                  maxItems: 16
                  description: |
                    Escape hatch for verbatim vLLM CLI args. Each item is a
                    single token — either `--flag` or `--flag=value` (NOT
                    `--flag value` as two tokens). These are appended AFTER
                    all composition-managed flags, so they can extend the
                    engine but never override the curated surface: reserved
                    flags (--model, --max-model-len, --enable-lora, --port,
                    etc.) are rejected at admission by CEL and must be set
                    through their dedicated spec fields instead. Values are
                    NOT validated against vLLM — an unknown or malformed flag
                    fails at container start, not at admission.
                  items:
                    type: string
                    maxLength: 256
                gpu:
                  type: object
                  description: GPU resource requirements
                  properties:
                    count:
                      type: integer
                      description: nvidia.com/gpu request per pod
                      minimum: 1
                      maximum: 8
                      default: 1
                    minVRAM:
                      type: string
                      description: Minimum VRAM hint for instance selection (informational)
                      default: 16Gi
                  required:
                    - count
                routing:
                  type: object
                  description: Metadata consumed by Semantic Router classifier configuration
                  properties:
                    tier:
                      type: string
                      enum: ["small", "medium", "large"]
                      default: medium
                    specialty:
                      type: string
                      enum: ["general", "code", "code-fim", "math", "guardrail", "multilingual"]
                      default: general
                scaling:
                  type: object
                  description: |
                    KEDA `ScaledObject` parameters. Composition v0.5.0+
                    scales each model on **leading** vLLM saturation
                    metrics (running/maxNumSeqs ratio + KV-cache
                    utilization + waiting-queue depth) — three prometheus
                    triggers, OR-combined. See SPEC-001 in docs/specs/.
                  properties:
                    minReplicas:
                      type: integer
                      description: |
                        Production default is 1 — keeps the model warm
                        and avoids the 'no pod, no metric, no signal'
                        deadlock that plagued the prior design.
                      minimum: 0
                      default: 1
                    maxReplicas:
                      type: integer
                      minimum: 1
                      default: 3
                    cooldownSeconds:
                      type: integer
                      description: |
                        KEDA `cooldownPeriod` — minimum seconds before a
                        scale-down once load drops. 5 min default
                        (amortises ~30s CUDA-graph compile cost ~10×).
                      minimum: 60
                      default: 300
                    pollingIntervalSeconds:
                      type: integer
                      description: |
                        How often KEDA queries VictoriaMetrics for the
                        trigger expressions. 15s = effective minimum
                        scale-up reaction time of ~75-135s end-to-end.
                      minimum: 5
                      default: 15
                    runningRatioThreshold:
                      type: string
                      description: |
                        Trigger 1 threshold — scale up when
                        `vllm:num_requests_running / maxNumSeqs` exceeds
                        this. 0.7 means "70% of the batch slots are
                        full"; gives ~30s of headroom before the queue
                        forms, which is roughly the scale-up budget.
                      default: "0.7"
                    cacheUtilizationThreshold:
                      type: string
                      description: |
                        Trigger 2 threshold — scale up when
                        `vllm:gpu_cache_usage_perc` exceeds this. 0.6
                        catches long-context bursts (a single 32k-context
                        request can fill 30-50% of KV cache by itself,
                        invisible to the running-count trigger).
                      default: "0.6"
                    queueLengthThreshold:
                      type: integer
                      description: |
                        Trigger 3 threshold — scale up when
                        `vllm:num_requests_waiting` exceeds this. The
                        waiting queue is the earliest pressure signal:
                        requests queue before the running ratio saturates.
                        Default 8 tolerates a short burst; a sustained
                        queue drives scale-up. OR-combined with the
                        running-ratio and KV-cache triggers.
                      minimum: 1
                      default: 8
                cache:
                  type: object
                  description: vLLM / LMCache toggles
                  properties:
                    kvOffload:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        sizeGB:
                          type: integer
                          minimum: 1
                          default: 16
                    prefixCache:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                loraAdapters:
                  type: array
                  description: |
                    Optional list of LoRA adapters mounted over the base model.
                    Each adapter is downloaded by the preload Job into
                    /models/loras/<name>/ on the shared S3 Files PVC and
                    exposed to clients as a separate model name via the
                    OpenAI /v1/chat/completions `model` field. Empty/absent
                    list = no adapters (current behavior). Composition emits
                    `--enable-lora --max-loras N --max-lora-rank 64
                    --lora-modules <name>=<path> ...` into vLLM args when
                    non-empty. See PR #1434 / spec
                    docs/superpowers/specs/2026-05-09-llm-platform-paths-7-8-design.md.
                  items:
                    type: object
                    required: [name, repository]
                    properties:
                      name:
                        type: string
                        description: |
                          Adapter identifier (kebab-case). Becomes the model
                          name clients send in the OpenAI request body.
                      repository:
                        type: string
                        description: |
                          HuggingFace repo id (e.g., `org/qwen-coder-sql-lora`).
                      revision:
                        type: string
                        description: |
                          HF revision (branch name, tag, or commit SHA).
                          Defaults to "main" if omitted.
                        default: main
                gateway:
                  type: object
                  description: |
                    SPEC-002: composition-owned Envoy AI Gateway routing.
                    When enabled, the composition renders the claim's
                    Backend (FQDN of its Service), AIServiceBackend
                    (OpenAI schema) and AIGatewayRoute (parentRef
                    ai-gateway/envoy-ai-gateway-system) — replacing the
                    hand-written entries in
                    apps/base/ai/llm/ai-gateway-routes/route.yaml. The
                    AIGatewayRoute is withheld until the Deployment
                    reports Available=True, then latched (never withdrawn
                    on transient unavailability). Opt-in, default off.
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    endpointPicker:
                      type: object
                      description: |
                        SPEC-004: opt-in Gateway API Inference Extension
                        (GAIE v1.5.0) smart routing. When enabled, the
                        composition renders a per-claim Flux HelmRelease
                        (chart `inferencepool`) that installs an InferencePool
                        + Endpoint Picker (EPP), and re-points the
                        AIGatewayRoute base rule at that InferencePool
                        (backendRef group inference.networking.k8s.io, kind
                        InferencePool) instead of the SPEC-002 AIServiceBackend
                        chain. The EPP scores every candidate vLLM replica per
                        request on queue depth + KV-cache utilization + prefix
                        affinity + LoRA-awareness — replacing the Service's
                        round-robin. Requires gateway.enabled and is mutually
                        exclusive with gateway.canaries[] (both CEL-enforced).
                        Opt-in, default off; only pays off at N>1 replicas but
                        wires cleanly at N=1 (EPP is a no-op with one endpoint).
                      properties:
                        enabled:
                          type: boolean
                          description: |
                            Render the InferencePool + EPP and switch the base
                            rule's backendRef to the InferencePool. Default
                            false (opt-in).
                          default: false
                    canaries:
                      type: array
                      maxItems: 4
                      description: |
                        Weighted canaries between the base model and one or
                        more of its LoRA adapters (same pod — zero extra GPU).
                        Each entry rewrites weightPercent of base-model traffic
                        (modelNameOverride) to the adapter's loraAdapters[].name
                        verbatim (names are fully-qualified by convention —
                        CL-5); explicit requests for an adapter name stay pinned
                        at 100%. Adapter names must be distinct across entries
                        and the sum of all weightPercent must stay <= 99 so the
                        base model always retains traffic (all CEL-enforced).
                      items:
                        type: object
                        required: [adapter, weightPercent]
                        properties:
                          adapter:
                            type: string
                            description: Must match a loraAdapters[].name entry (CEL-enforced).
                          weightPercent:
                            type: integer
                            description: Percent of base-model traffic sent to the adapter.
                            minimum: 1
                            maximum: 99
                route:
                  type: object
                  description: |
                    Per-model HTTPRoute on the platform Tailscale gateway
                    (platform-tailscale-general/infrastructure). Usually
                    disabled — claims reach vLLM via the Semantic Router.
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    hostname:
                      type: string
                      description: Short hostname; .priv.cloud.ogenki.io appended
                weightsFileSystem:
                  type: object
                  description: |
                    Optional override for which subdirectory of the shared
                    S3 Files mount this claim lives in. The PV+PVC
                    `llm-models` is provisioned out-of-band in
                    apps/base/ai/llm/models-pvc.yaml (Crossplane v2
                    namespaced XRs cannot render cluster-scoped PVs).
                  properties:
                    subPath:
                      type: string
                      description: |
                        Subdirectory under the access point root where this
                        model's weights live. Defaults to the claim name
                        (metadata.name).
                resources:
                  type: object
                  description: CPU/memory requests + limits for the vLLM container (GPU is auto-injected)
                  properties:
                    requests:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    limits:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                healthProbes:
                  type: object
                  properties:
                    liveness:
                      type: object
                      properties:
                        initialDelaySeconds: {type: integer, default: 60}
                        periodSeconds: {type: integer, default: 30}
                        timeoutSeconds: {type: integer, default: 10}
                        failureThreshold: {type: integer, default: 3}
                    readiness:
                      type: object
                      properties:
                        initialDelaySeconds: {type: integer, default: 30}
                        periodSeconds: {type: integer, default: 10}
                        timeoutSeconds: {type: integer, default: 5}
                        failureThreshold: {type: integer, default: 3}
                securityContext:
                  type: object
                  description: Container-level security overrides; defaults satisfy constitution
                  properties:
                    allowPrivilegeEscalation:
                      type: boolean
                      default: false
                    readOnlyRootFilesystem:
                      type: boolean
                      default: true
                    runAsNonRoot:
                      type: boolean
                      default: true
                    capabilities:
                      type: object
                      properties:
                        drop:
                          type: array
                          items: {type: string}
                          default: ["ALL"]
                externalSecrets:
                  type: array
                  description: ExternalSecret entries (one Kubernetes Secret per item)
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      remoteRef:
                        type: string
                      refreshInterval:
                        type: string
                        default: "1h"
                    required:
                      - name
                      - remoteRef
                envFromSecrets:
                  type: array
                  description: |
                    Names of pre-existing Secrets in the same namespace to envFrom
                    into the inference container and the preload Job. Use this for
                    Secrets shared across claims (e.g. hf-token) — the composition
                    will not create or manage these Secrets.
                  items:
                    type: string
                networkPolicies:
                  type: object
                  description: Override default-deny CiliumNetworkPolicy ingress/egress
                  properties:
                    ingress:
                      type: array
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    egress:
                      type: array
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                observability:
                  type: object
                  properties:
                    metrics:
                      type: object
                      properties:
                        interval:
                          type: string
                          default: "30s"
                    alertingRules:
                      type: object
                      properties:
                        groups:
                          type: array
                          items:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
              required:
                - model
                - gpu
            status:
              type: object
              properties:
                phase:
                  type: string
                modelEndpoint:
                  type: string
                  description: |
                    OpenAI-compatible endpoint URL for this model. When
                    spec.gateway.enabled, the external Envoy AI Gateway URL
                    (https://llm.<domain>/v1); otherwise unset.
                servedModels:
                  type: array
                  description: |
                    Topology projection — the set of model names this claim
                    serves (the base model plus any LoRA adapters) and any
                    active canary split. This is a routing/topology view, NOT
                    a health signal; readiness lives in status.phase.
                  items:
                    type: object
                    required: [name, kind]
                    properties:
                      name:
                        type: string
                        description: Served model name (base = claim name; adapter = loraAdapters[].name).
                      kind:
                        type: string
                        description: Whether this served name is the base model or a LoRA adapter.
                        enum: ["base", "adapter"]
                      canaryWeightPercent:
                        type: integer
                        description: |
                          Percent of base-model traffic routed to this entry
                          when it participates in a gateway canary split.
                          Absent when the entry is not part of a canary.
                        minimum: 1
                        maximum: 99
                servedModelsSummary:
                  type: string
                  description: |
                    Comma-joined servedModels names — printer-column source
                    (server-side printer columns render only the first wildcard
                    JSONPath match); see servedModels for the structured view.
