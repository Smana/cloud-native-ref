apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
    name: xinferenceservices.cloud.ogenki.io
    labels:
        provider: aws
spec:
    compositeTypeRef:
        apiVersion: cloud.ogenki.io/v1alpha1
        kind: InferenceService
    mode: Pipeline
    pipeline:
        - step: environmentConfigs
          functionRef:
              name: function-environment-configs
          input:
              apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
              kind: Input
              spec:
                  environmentConfigs:
                      - type: Reference
                        ref:
                            name: eks-environment

        - step: inference-service
          functionRef:
              name: function-kcl
          input:
              apiVersion: krm.kcl.dev/v1alpha1
              kind: KCLRun
              spec:
                  # MUST be Default, not Resources (the other compositions here use
                  # Resources because none of them patch XR status).
                  #
                  # main.k emits a desired-composite item (`**option("params").dxr`
                  # + status) to publish status.servedModels (SPEC-003 FR-007).
                  # function-kcl only honours that under target: Default, where
                  # ProcessResources routes any item whose GVK matches the XR into a
                  # status merge and then `continue`s. Under target: Resources there
                  # is no such branch — EVERY item is treated as a composed resource,
                  # so the dxr item leaks out as a bogus composed InferenceService.
                  # It carries no composition-resource-name annotation and dxr has no
                  # metadata (function-kcl sets only apiVersion/kind on it), so it
                  # lands with an empty resource name and no spec:
                  #   cannot apply composed resource "": InferenceService
                  #   "xplane-qwen3-8b-rfgbr" is invalid: [spec: Required value]
                  # -> the XR never reaches Synced=True and servedModels stays empty.
                  #
                  # Safe to switch: both targets key composed resources through the
                  # same GetResourceName() (the krm.kcl.dev/composition-resource-name
                  # annotation, falling back to metadata.name), so the other rendered
                  # resources keep their identities and are not recreated.
                  target: Default
                  # PR-preview tag. This MUST be `<kcl.mod version>-pr<PR number>` while
                  # the PR is open and `<kcl.mod version>` on main — the
                  # `validate-composition-versions` job in crossplane-modules.yml enforces
                  # exactly that, keying on `github.event_name`. Pinning the release tag
                  # early fails the PR; leaving the -pr tag fails main.
                  #
                  # >>> STRIP THE `-pr1559` SUFFIX IN A FOLLOW-UP COMMIT ON MAIN. <<<
                  #
                  # This is not a nicety. On push to main the same job expects the bare
                  # `0.8.2`, so main goes red until it is stripped — and main is left
                  # pointing at a mutable PR-preview artifact. That follow-up is
                  # demonstrably easy to forget: main still carries
                  # `crossplane-app:0.1.10-pr1434`, and carried
                  # `crossplane-inference-service:0.6.0-pr1434` until this branch
                  # overwrote it. Two PRs, two promises, zero follow-ups.
                  source: oci://ghcr.io/smana/cloud-native-ref/crossplane-inference-service:0.8.2-pr1559

        - step: ready
          functionRef:
              name: function-auto-ready
