apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
    name: xinferenceservices.cloud.ogenki.io
    labels:
        provider: aws
spec:
    compositeTypeRef:
        apiVersion: cloud.ogenki.io/v1alpha1
        kind: InferenceService
    mode: Pipeline
    pipeline:
        - step: environmentConfigs
          functionRef:
              name: function-environment-configs
          input:
              apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
              kind: Input
              spec:
                  environmentConfigs:
                      - type: Reference
                        ref:
                            name: eks-environment

        - step: inference-service
          functionRef:
              name: function-kcl
          input:
              apiVersion: krm.kcl.dev/v1alpha1
              kind: KCLRun
              spec:
                  target: Resources
                  # PR-preview tag (0.7.0-pr1559) — strip the -pr suffix post-merge
                  # once the release tag is published from main.
                  source: oci://ghcr.io/smana/cloud-native-ref/crossplane-inference-service:0.7.0-pr1559

        - step: ready
          functionRef:
              name: function-auto-ready
