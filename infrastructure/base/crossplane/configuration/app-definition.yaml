apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: apps.cloud.ogenki.io
spec:
  group: cloud.ogenki.io
  scope: Namespaced
  names:
    kind: App
    plural: apps
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-validations:
                - rule: "!has(self.autoscaling) || !self.autoscaling.enabled || self.autoscaling.minReplicas <= self.autoscaling.maxReplicas"
                  message: "autoscaling.minReplicas must be <= maxReplicas"
                - rule: "!has(self.route) || !self.route.enabled || has(self.route.hostname)"
                  message: "route.hostname is required when route is enabled"
                - rule: "!has(self.sqlInstance) || !self.sqlInstance.enabled || !has(self.sqlInstance.backup) || !has(self.sqlInstance.backup.schedule) || has(self.sqlInstance.backup.bucketName)"
                  message: "sqlInstance.backup.bucketName is required when backup schedule is set"
                - rule: "!has(self.type) || self.type != 'cron' || has(self.schedule)"
                  message: "schedule is required when type is 'cron'"
                - rule: "!has(self.schedule) || (has(self.type) && self.type == 'cron')"
                  message: "schedule is only valid when type is 'cron'"
                - rule: "!has(self.route) || !self.route.enabled || !has(self.type) || self.type == 'web'"
                  message: "route is only valid when type is 'web'"
                - rule: "!has(self.gateway) || !self.gateway.enabled || !has(self.type) || self.type == 'web'"
                  message: "gateway is only valid when type is 'web'"
                - rule: "!has(self.autoscaling) || !self.autoscaling.enabled || !has(self.type) || self.type != 'cron'"
                  message: "autoscaling is not valid when type is 'cron'"
                - rule: "!has(self.pdb) || !self.pdb.enabled || !has(self.type) || self.type != 'cron'"
                  message: "pdb is not valid when type is 'cron'"
                - rule: "!has(self.persistence) || !self.persistence.enabled || (has(self.persistence.size) && has(self.persistence.mountPath))"
                  message: "persistence.size and persistence.mountPath are required when persistence is enabled"
                - rule: "!has(self.persistence) || !self.persistence.enabled || !has(self.autoscaling) || !self.autoscaling.enabled || (has(self.persistence.accessModes) && !('ReadWriteOnce' in self.persistence.accessModes))"
                  message: "autoscaling is incompatible with ReadWriteOnce persistence (multi-attach)"
              properties:
                # Deployment specific parameters
                image:
                  type: object
                  properties:
                    repository:
                      type: string
                      description: Container image repository
                    tag:
                      type: string
                      description: Container image tag
                      default: "latest"
                    pullPolicy:
                      type: string
                      description: Image pull policy
                      enum: ["Always", "Never", "IfNotPresent"]
                      default: "IfNotPresent"
                  required:
                    - repository
                type:
                  type: string
                  description: |
                    Workload shape. `web` renders a Deployment plus a Service and
                    optional HTTPRoute/Gateway (HTTP service). `worker` renders a
                    Deployment only — no Service, route, or default HTTP probes
                    (background/queue consumer). `cron` renders a CronJob driven by
                    `schedule` (scheduled batch task).
                  enum: ["web", "worker", "cron"]
                  default: "web"
                schedule:
                  type: string
                  description: CronJob schedule — a cron expression or a named schedule (@daily, @hourly, …); required when type=cron
                  pattern: "^(@(hourly|daily|weekly|monthly|yearly|annually|midnight)|[0-9*/ ,-]+)$"
                cron:
                  type: object
                  description: CronJob tuning (only used when type=cron)
                  properties:
                    concurrencyPolicy:
                      type: string
                      description: How to treat concurrent executions of a job
                      enum: ["Allow", "Forbid", "Replace"]
                      default: "Forbid"
                    backoffLimit:
                      type: integer
                      description: Number of retries before marking a job as failed
                      minimum: 0
                      default: 3
                    activeDeadlineSeconds:
                      type: integer
                      description: Deadline in seconds for the job to complete
                      minimum: 1
                    restartPolicy:
                      type: string
                      description: Restart policy for the job pod
                      enum: ["OnFailure", "Never"]
                      default: "OnFailure"
                    successfulJobsHistoryLimit:
                      type: integer
                      description: Number of successful finished jobs to retain
                      default: 3
                    failedJobsHistoryLimit:
                      type: integer
                      description: Number of failed finished jobs to retain
                      default: 3
                command:
                  type: array
                  description: Entrypoint override for the main container
                  items:
                    type: string
                args:
                  type: array
                  description: Arguments to the main container entrypoint
                  items:
                    type: string
                imagePullSecrets:
                  type: array
                  description: Names of image pull secrets in the same namespace
                  items:
                    type: string
                terminationGracePeriodSeconds:
                  type: integer
                  description: Grace period in seconds before the pod is force-killed
                  minimum: 0
                autoscaling:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      description: Enable horizontal pod autoscaling
                      default: false
                    minReplicas:
                      type: integer
                      description: Minimum number of replicas
                      minimum: 1
                      default: 1
                    maxReplicas:
                      type: integer
                      description: Maximum number of replicas
                      minimum: 1
                      default: 5
                    targetCPUUtilizationPercentage:
                      type: integer
                      description: Target CPU utilization percentage
                      minimum: 1
                      maximum: 100
                      default: 70
                replicas:
                  type: integer
                  description: Number of replicas when autoscaling is disabled
                  minimum: 1
                  default: 1
                deploymentStrategy:
                  type: string
                  description: |
                    Deployment update strategy. Use `Recreate` for apps with
                    RWO PVCs (gp3 default StorageClass) — RollingUpdate would
                    spin up the new pod alongside the old, which can't attach
                    a single-attach volume and stalls with `Multi-Attach error
                    for volume`. Use `RollingUpdate` for stateless apps.
                    When unset, the effective default is `RollingUpdate`, or
                    `Recreate` when `persistence.enabled` is true (RWO
                    multi-attach guard); an explicit value always wins.
                  enum: [RollingUpdate, Recreate]
                pdb:
                  type: object
                  description: Pod Disruption Budget configuration
                  properties:
                    enabled:
                      type: boolean
                      description: Enable Pod Disruption Budget
                      default: false
                    minAvailable:
                      type: integer
                      description: Minimum available pods
                      minimum: 1
                    unhealthyPodEvictionPolicy:
                      type: string
                      description: Unhealthy pod eviction policy
                      enum: ["IfHealthyBudget", "AlwaysAllow"]
                      default: "AlwaysAllow"
                persistence:
                  type: object
                  description: |
                    Simple persistent storage. When enabled, renders a PVC mounted
                    at `mountPath` on the main container. With RWO access (default),
                    the effective deployment strategy becomes `Recreate` to avoid the
                    multi-attach trap; RWO persistence is incompatible with autoscaling.
                  properties:
                    enabled:
                      type: boolean
                      description: Enable persistent storage (renders a PVC)
                      default: false
                    size:
                      type: string
                      description: Requested storage size (required when enabled)
                      pattern: "^[0-9]+[KMGT]i$"
                    mountPath:
                      type: string
                      description: Path where the volume is mounted (required when enabled)
                    storageClass:
                      type: string
                      description: StorageClass name (defaults to the cluster default when unset)
                    accessModes:
                      type: array
                      description: PVC access modes
                      items:
                        type: string
                        enum: ["ReadWriteOnce", "ReadWriteMany", "ReadOnlyMany"]
                      default: ["ReadWriteOnce"]
                resources:
                  type: object
                  description: Resource requirements
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          description: CPU request
                          pattern: "^[0-9]+m?$"
                        memory:
                          type: string
                          description: Memory request
                          pattern: "^[0-9]+[KMGT]i?$"
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                          description: CPU limit
                          pattern: "^[0-9]+m?$"
                        memory:
                          type: string
                          description: Memory limit
                          pattern: "^[0-9]+[KMGT]i?$"
                onDemand:
                  type: boolean
                  description: Use on-demand instances
                  default: false
                runAsNonRoot:
                  type: boolean
                  description: Run container as non-root user
                  default: true
                spreadAcrossZones:
                  type: boolean
                  description: Spread pods across availability zones
                  default: true
                antiAffinityPreset:
                  type: string
                  description: Anti-affinity preset
                  enum: ["soft", "hard"]
                  default: "soft"
                automountServiceAccountToken:
                  type: boolean
                  description: Auto-mount service account token
                  default: false
                securityContext:
                  type: object
                  description: Container and pod security context settings
                  properties:
                    allowPrivilegeEscalation:
                      type: boolean
                      description: Allow privilege escalation
                      default: false
                    readOnlyRootFilesystem:
                      type: boolean
                      description: Mount root filesystem as read-only
                      default: true
                    runAsNonRoot:
                      type: boolean
                      description: Require container to run as non-root user
                      default: true
                    capabilities:
                      type: object
                      description: Linux capabilities
                      properties:
                        drop:
                          type: array
                          description: Capabilities to drop
                          items:
                            type: string
                          default: ["ALL"]
                    enableWritableTmp:
                      type: boolean
                      description: Enable writable /tmp directory via emptyDir volume
                      default: true
                env:
                  type: array
                  description: Environment variables to set in the container
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Environment variable name
                      value:
                        type: string
                        description: Environment variable value
                      valueFrom:
                        type: object
                        description: Source for the environment variable value
                        properties:
                          configMapKeyRef:
                            type: object
                            description: Reference to a ConfigMap key
                            properties:
                              name:
                                type: string
                                description: Name of the ConfigMap
                              key:
                                type: string
                                description: Key in the ConfigMap
                            required:
                              - name
                              - key
                          secretKeyRef:
                            type: object
                            description: Reference to a Secret key
                            properties:
                              name:
                                type: string
                                description: Name of the Secret
                              key:
                                type: string
                                description: Key in the Secret
                            required:
                              - name
                              - key
                          fieldRef:
                            type: object
                            description: Reference to a field in the pod spec
                            properties:
                              fieldPath:
                                type: string
                                description: Path to the field
                            required:
                              - fieldPath
                    required:
                      - name
                envFrom:
                  type: array
                  description: List of sources to populate environment variables
                  items:
                    type: object
                    properties:
                      configMapRef:
                        type: object
                        description: ConfigMap to populate environment variables from
                        properties:
                          name:
                            type: string
                            description: Name of the ConfigMap
                          optional:
                            type: boolean
                            description: Whether the ConfigMap must exist
                            default: false
                        required:
                          - name
                      secretRef:
                        type: object
                        description: Secret to populate environment variables from
                        properties:
                          name:
                            type: string
                            description: Name of the Secret
                          optional:
                            type: boolean
                            description: Whether the Secret must exist
                            default: false
                        required:
                          - name
                      prefix:
                        type: string
                        description: Prefix to add to all environment variables
                initContainers:
                  type: array
                  description: Init containers that run to completion before the main container starts. Inherit the constitution security defaults unless overridden.
                  maxItems: 16
                  x-kubernetes-validations:
                    - rule: "self.all(c, c.name != 'main')"
                      message: "container name 'main' is reserved for the primary container"
                    - rule: "self.all(c, self.filter(d, d.name == c.name).size() == 1)"
                      message: "initContainers names must be unique"
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Container name
                      image:
                        type: string
                        description: Container image in plain "repo:tag" form
                      command:
                        type: array
                        description: Entrypoint override for the container
                        items:
                          type: string
                      args:
                        type: array
                        description: Arguments to the container entrypoint
                        items:
                          type: string
                      env:
                        type: array
                        description: Environment variables to set in the container
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              description: Environment variable name
                            value:
                              type: string
                              description: Environment variable value
                            valueFrom:
                              type: object
                              description: Source for the environment variable value
                              properties:
                                configMapKeyRef:
                                  type: object
                                  description: Reference to a ConfigMap key
                                  properties:
                                    name:
                                      type: string
                                      description: Name of the ConfigMap
                                    key:
                                      type: string
                                      description: Key in the ConfigMap
                                  required:
                                    - name
                                    - key
                                secretKeyRef:
                                  type: object
                                  description: Reference to a Secret key
                                  properties:
                                    name:
                                      type: string
                                      description: Name of the Secret
                                    key:
                                      type: string
                                      description: Key in the Secret
                                  required:
                                    - name
                                    - key
                                fieldRef:
                                  type: object
                                  description: Reference to a field in the pod spec
                                  properties:
                                    fieldPath:
                                      type: string
                                      description: Path to the field
                                  required:
                                    - fieldPath
                          required:
                            - name
                      envFrom:
                        type: array
                        description: List of sources to populate environment variables
                        items:
                          type: object
                          properties:
                            configMapRef:
                              type: object
                              description: ConfigMap to populate environment variables from
                              properties:
                                name:
                                  type: string
                                  description: Name of the ConfigMap
                                optional:
                                  type: boolean
                                  description: Whether the ConfigMap must exist
                                  default: false
                              required:
                                - name
                            secretRef:
                              type: object
                              description: Secret to populate environment variables from
                              properties:
                                name:
                                  type: string
                                  description: Name of the Secret
                                optional:
                                  type: boolean
                                  description: Whether the Secret must exist
                                  default: false
                              required:
                                - name
                            prefix:
                              type: string
                              description: Prefix to add to all environment variables
                      resources:
                        type: object
                        description: Resource requirements
                        properties:
                          requests:
                            type: object
                            properties:
                              cpu:
                                type: string
                                description: CPU request
                                pattern: "^[0-9]+m?$"
                              memory:
                                type: string
                                description: Memory request
                                pattern: "^[0-9]+[KMGT]i?$"
                          limits:
                            type: object
                            properties:
                              cpu:
                                type: string
                                description: CPU limit
                                pattern: "^[0-9]+m?$"
                              memory:
                                type: string
                                description: Memory limit
                                pattern: "^[0-9]+[KMGT]i?$"
                      volumeMounts:
                        type: array
                        description: Container volume mounts (passthrough to Container.volumeMounts)
                        items:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                      securityContext:
                        type: object
                        description: Container security context override (defaults to the constitution security defaults)
                        properties:
                          allowPrivilegeEscalation:
                            type: boolean
                            description: Allow privilege escalation
                            default: false
                          readOnlyRootFilesystem:
                            type: boolean
                            description: Mount root filesystem as read-only
                            default: true
                          runAsNonRoot:
                            type: boolean
                            description: Require container to run as non-root user
                            default: true
                          capabilities:
                            type: object
                            description: Linux capabilities
                            properties:
                              drop:
                                type: array
                                description: Capabilities to drop
                                items:
                                  type: string
                                default: ["ALL"]
                    required:
                      - name
                      - image
                sidecars:
                  type: array
                  description: Sidecar containers that run alongside the main container. Inherit the constitution security defaults unless overridden.
                  maxItems: 16
                  x-kubernetes-validations:
                    - rule: "self.all(c, c.name != 'main')"
                      message: "container name 'main' is reserved for the primary container"
                    - rule: "self.all(c, self.filter(d, d.name == c.name).size() == 1)"
                      message: "sidecars names must be unique"
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Container name
                      image:
                        type: string
                        description: Container image in plain "repo:tag" form
                      command:
                        type: array
                        description: Entrypoint override for the container
                        items:
                          type: string
                      args:
                        type: array
                        description: Arguments to the container entrypoint
                        items:
                          type: string
                      env:
                        type: array
                        description: Environment variables to set in the container
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              description: Environment variable name
                            value:
                              type: string
                              description: Environment variable value
                            valueFrom:
                              type: object
                              description: Source for the environment variable value
                              properties:
                                configMapKeyRef:
                                  type: object
                                  description: Reference to a ConfigMap key
                                  properties:
                                    name:
                                      type: string
                                      description: Name of the ConfigMap
                                    key:
                                      type: string
                                      description: Key in the ConfigMap
                                  required:
                                    - name
                                    - key
                                secretKeyRef:
                                  type: object
                                  description: Reference to a Secret key
                                  properties:
                                    name:
                                      type: string
                                      description: Name of the Secret
                                    key:
                                      type: string
                                      description: Key in the Secret
                                  required:
                                    - name
                                    - key
                                fieldRef:
                                  type: object
                                  description: Reference to a field in the pod spec
                                  properties:
                                    fieldPath:
                                      type: string
                                      description: Path to the field
                                  required:
                                    - fieldPath
                          required:
                            - name
                      envFrom:
                        type: array
                        description: List of sources to populate environment variables
                        items:
                          type: object
                          properties:
                            configMapRef:
                              type: object
                              description: ConfigMap to populate environment variables from
                              properties:
                                name:
                                  type: string
                                  description: Name of the ConfigMap
                                optional:
                                  type: boolean
                                  description: Whether the ConfigMap must exist
                                  default: false
                              required:
                                - name
                            secretRef:
                              type: object
                              description: Secret to populate environment variables from
                              properties:
                                name:
                                  type: string
                                  description: Name of the Secret
                                optional:
                                  type: boolean
                                  description: Whether the Secret must exist
                                  default: false
                              required:
                                - name
                            prefix:
                              type: string
                              description: Prefix to add to all environment variables
                      resources:
                        type: object
                        description: Resource requirements
                        properties:
                          requests:
                            type: object
                            properties:
                              cpu:
                                type: string
                                description: CPU request
                                pattern: "^[0-9]+m?$"
                              memory:
                                type: string
                                description: Memory request
                                pattern: "^[0-9]+[KMGT]i?$"
                          limits:
                            type: object
                            properties:
                              cpu:
                                type: string
                                description: CPU limit
                                pattern: "^[0-9]+m?$"
                              memory:
                                type: string
                                description: Memory limit
                                pattern: "^[0-9]+[KMGT]i?$"
                      volumeMounts:
                        type: array
                        description: Container volume mounts (passthrough to Container.volumeMounts)
                        items:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                      securityContext:
                        type: object
                        description: Container security context override (defaults to the constitution security defaults)
                        properties:
                          allowPrivilegeEscalation:
                            type: boolean
                            description: Allow privilege escalation
                            default: false
                          readOnlyRootFilesystem:
                            type: boolean
                            description: Mount root filesystem as read-only
                            default: true
                          runAsNonRoot:
                            type: boolean
                            description: Require container to run as non-root user
                            default: true
                          capabilities:
                            type: object
                            description: Linux capabilities
                            properties:
                              drop:
                                type: array
                                description: Capabilities to drop
                                items:
                                  type: string
                                default: ["ALL"]
                      ports:
                        type: array
                        description: Ports exposed by the sidecar container
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              description: Port name
                            containerPort:
                              type: integer
                              description: Container port number
                              minimum: 1
                              maximum: 65535
                            protocol:
                              type: string
                              description: Port protocol
                              enum: ["TCP", "UDP"]
                              default: "TCP"
                    required:
                      - name
                      - image
                extraVolumes:
                  type: array
                  description: Extra volumes to add to the pod (passthrough to PodSpec.volumes). Combined with the default `tmp` emptyDir.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                extraVolumeMounts:
                  type: array
                  description: Extra container volume mounts (passthrough to Container.volumeMounts). Combined with the default `/tmp` mount.
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                configs:
                  type: object
                  description: Configuration files to mount
                  additionalProperties:
                    type: object
                    properties:
                      path:
                        type: string
                        description: Path where config will be mounted in container
                      content:
                        type: string
                        description: Configuration content
                    required:
                      - path
                      - content
                secrets:
                  type: object
                  description: Secrets to mount as environment variables
                  additionalProperties:
                    type: object
                    properties:
                      path:
                        type: string
                        description: Path to secret in AWS Secrets Manager
                      keys:
                        type: array
                        description: Keys to fetch from the secret
                        items:
                          type: string
                    required:
                      - path
                # Health probe configuration
                healthProbes:
                  type: object
                  description: Health check probe configuration
                  properties:
                    liveness:
                      type: object
                      description: Liveness probe configuration
                      properties:
                        type:
                          type: string
                          description: Probe type (http, tcp, grpc, exec)
                          enum: ["http", "tcp", "grpc", "exec"]
                          default: "http"
                        path:
                          type: string
                          description: HTTP path for liveness probe (http type only)
                          default: "/healthz"
                        port:
                          type: integer
                          description: Probe port (defaults to service.port when unset)
                          minimum: 1
                          maximum: 65535
                        command:
                          type: array
                          description: Command to run for the exec probe (exec type only)
                          items:
                            type: string
                        initialDelaySeconds:
                          type: integer
                          description: Initial delay before liveness probe
                          default: 30
                        periodSeconds:
                          type: integer
                          description: How often to perform the probe
                          default: 10
                        failureThreshold:
                          type: integer
                          description: Consecutive failures before the probe is considered failed
                          default: 3
                    readiness:
                      type: object
                      description: Readiness probe configuration
                      properties:
                        type:
                          type: string
                          description: Probe type (http, tcp, grpc, exec)
                          enum: ["http", "tcp", "grpc", "exec"]
                          default: "http"
                        path:
                          type: string
                          description: HTTP path for readiness probe (http type only)
                          default: "/readyz"
                        port:
                          type: integer
                          description: Probe port (defaults to service.port when unset)
                          minimum: 1
                          maximum: 65535
                        command:
                          type: array
                          description: Command to run for the exec probe (exec type only)
                          items:
                            type: string
                        initialDelaySeconds:
                          type: integer
                          description: Initial delay before readiness probe
                          default: 5
                        periodSeconds:
                          type: integer
                          description: How often to perform the probe
                          default: 5
                        failureThreshold:
                          type: integer
                          description: Consecutive failures before the probe is considered failed
                          default: 3
                    startup:
                      type: object
                      description: Startup probe configuration (disabled by default; guards slow-boot apps)
                      properties:
                        type:
                          type: string
                          description: Probe type (http, tcp, grpc, exec)
                          enum: ["http", "tcp", "grpc", "exec"]
                          default: "http"
                        path:
                          type: string
                          description: HTTP path for startup probe (http type only)
                        port:
                          type: integer
                          description: Probe port (defaults to service.port when unset)
                          minimum: 1
                          maximum: 65535
                        command:
                          type: array
                          description: Command to run for the exec probe (exec type only)
                          items:
                            type: string
                        initialDelaySeconds:
                          type: integer
                          description: Initial delay before startup probe
                          default: 0
                        periodSeconds:
                          type: integer
                          description: How often to perform the probe
                          default: 10
                        failureThreshold:
                          type: integer
                          description: Consecutive failures before the probe is considered failed
                          default: 30
                # Service configuration
                service:
                  type: object
                  description: Kubernetes Service configuration
                  properties:
                    port:
                      type: integer
                      description: Service port (container port to expose)
                      minimum: 1
                      maximum: 65535
                      default: 8080
                    extraPorts:
                      type: array
                      description: Additional Service ports (e.g. a separate metrics port)
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            description: Port name
                          port:
                            type: integer
                            description: Service port
                            minimum: 1
                            maximum: 65535
                          targetPort:
                            type: integer
                            description: Container target port (defaults to port when unset)
                            minimum: 1
                            maximum: 65535
                          protocol:
                            type: string
                            description: Port protocol
                            enum: ["TCP", "UDP"]
                            default: "TCP"
                        required:
                          - name
                          - port
                # Gateway and routing configuration
                gateway:
                  type: object
                  description: Gateway configuration for dedicated gateway
                  properties:
                    enabled:
                      type: boolean
                      description: Enable dedicated gateway creation
                      default: false
                    gatewayClassName:
                      type: string
                      description: Gateway class name
                    name:
                      type: string
                      description: Gateway name
                    namespace:
                      type: string
                      description: Gateway namespace
                    listeners:
                      type: array
                      description: Gateway listeners configuration
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            description: Listener name
                          port:
                            type: integer
                            description: Listener port
                          protocol:
                            type: string
                            description: Protocol (HTTP or HTTPS)
                            enum: ["HTTP", "HTTPS"]
                          hostname:
                            type: string
                            description: Hostname for this listener
                route:
                  type: object
                  description: HTTPRoute configuration for external access
                  properties:
                    enabled:
                      type: boolean
                      description: Enable HTTPRoute creation for external access
                      default: false
                    internetFacing:
                      type: boolean
                      description: Whether the service is internet-facing (uses public gateway when true, platform-tailscale when false)
                      default: false
                    hostname:
                      type: string
                      description: Hostname without domain suffix (domain auto-determined by internetFacing). Example 'myapp' becomes 'myapp.priv.cloud.ogenki.io' (private) or 'myapp.cloud.ogenki.io' (public)
                    rules:
                      type: array
                      description: Routing rules
                      items:
                        type: object
                        properties:
                          backendPort:
                            type: integer
                            description: Backend service port
                            minimum: 1
                            maximum: 65535
                          pathPrefix:
                            type: string
                            description: Path prefix for routing
                            pattern: "^/.*"
                            default: "/"
                        required:
                          - backendPort
                networkPolicies:
                  type: object
                  description: Cilium Network policies configuration
                  properties:
                    enabled:
                      type: boolean
                      description: Enable Cilium network policies
                      default: false
                    ingress:
                      type: array
                      description: Ingress rules
                      items:
                        type: object
                        properties:
                          fromEndpoints:
                            type: array
                            description: Source endpoint selectors
                            items:
                              type: object
                              properties:
                                matchLabels:
                                  type: object
                                  description: Label selectors for source endpoints
                                  additionalProperties:
                                    type: string
                          fromEntities:
                            type: array
                            description: Special entities (world, cluster, host, remote-node, kube-apiserver, ingress, init, health, unmanaged, all)
                            items:
                              type: string
                              enum: ["all", "world", "cluster", "host", "init", "ingress", "unmanaged", "remote-node", "health", "kube-apiserver"]
                          toPorts:
                            type: array
                            description: Port and protocol restrictions
                            items:
                              type: object
                              properties:
                                ports:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      port:
                                        type: string
                                        description: Port number or name
                                      protocol:
                                        type: string
                                        description: Protocol (TCP, UDP, ANY)
                                        enum: ["TCP", "UDP", "ANY"]
                                        default: "TCP"
                    egress:
                      type: array
                      description: Egress rules
                      items:
                        type: object
                        properties:
                          toEndpoints:
                            type: array
                            description: Destination endpoint selectors
                            items:
                              type: object
                              properties:
                                matchLabels:
                                  type: object
                                  description: Label selectors for destination endpoints
                                  additionalProperties:
                                    type: string
                          toEntities:
                            type: array
                            description: Special entities (world, cluster, host, remote-node, kube-apiserver, ingress, init, health, unmanaged, all)
                            items:
                              type: string
                              enum: ["all", "world", "cluster", "host", "init", "ingress", "unmanaged", "remote-node", "health", "kube-apiserver"]
                          toCIDR:
                            type: array
                            description: CIDR-based egress rules
                            items:
                              type: string
                              pattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
                          toFQDNs:
                            type: array
                            description: DNS-based egress rules
                            items:
                              type: object
                              properties:
                                matchName:
                                  type: string
                                  description: Exact DNS name match
                                matchPattern:
                                  type: string
                                  description: DNS pattern match with wildcards
                          toPorts:
                            type: array
                            description: Port and protocol restrictions
                            items:
                              type: object
                              properties:
                                ports:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      port:
                                        type: string
                                        description: Port number or name
                                      protocol:
                                        type: string
                                        description: Protocol (TCP, UDP, ANY)
                                        enum: ["TCP", "UDP", "ANY"]
                                        default: "TCP"
                # Infrastructure components
                kvStore:
                  type: object
                  description: Key-value store configuration
                  properties:
                    enabled:
                      type: boolean
                      description: Enable key-value store
                      default: false
                    size:
                      type: string
                      description: Store size
                      enum: ["small", "medium", "large"]
                      default: "small"
                    type:
                      type: string
                      description: Store type
                      enum: ["valkey", "redis"]
                      default: "valkey"
                sqlInstance:
                  type: object
                  description: SQL database instance configuration
                  properties:
                    enabled:
                      type: boolean
                      description: Enable SQL instance
                      default: false
                    size:
                      type: string
                      description: Instance size
                      enum: ["small", "medium", "large"]
                      default: "small"
                    storageSize:
                      type: string
                      description: Storage size
                      pattern: "^[0-9]+[KMGT]i$"
                    instances:
                      type: integer
                      description: Number of database instances
                      default: 3
                    primaryUpdateStrategy:
                      type: string
                      description: Update strategy for the primary instance
                      default: "unsupervised"
                    createSuperuser:
                      type: boolean
                      description: Create a superuser for the Postgres cluster
                      default: false
                    performanceInsights:
                      type: object
                      description: |
                        PostgreSQL performance insights and query plan history configuration.
                        Configures pg_stat_statements, auto_explain, and compute_query_id
                        for comprehensive query performance monitoring with execution plan capture.
                      properties:
                        enabled:
                          type: boolean
                          description: Enable performance insights monitoring (pg_stat_statements).
                          default: false
                        explain:
                          type: object
                          description: |
                            Auto-explain configuration for capturing query execution plans.
                            When enabled, automatically logs execution plans for slow queries.
                          properties:
                            sampleRate:
                              type: number
                              description: |
                                Sample rate for auto_explain query plan capture (0.0 to 1.0).
                                - 0.2 (default): Capture 20% of slow queries to minimize overhead
                                - 1.0: Capture all slow queries (recommended for testing/debugging)
                                - 0.0: Disable query plan capture (only collect pg_stat_statements metrics)
                              default: 0.2
                              minimum: 0.0
                              maximum: 1.0
                            minDuration:
                              type: integer
                              description: |
                                Minimum query duration (in milliseconds) to trigger auto_explain logging.
                                - 1000 (default): Log queries taking longer than 1 second
                                - 100: More aggressive logging for performance debugging
                                - 0: Log ALL queries (warning: high overhead, use only for debugging)
                                - -1: Disable auto_explain completely (only use pg_stat_statements)
                              default: 1000
                              minimum: -1
                        logStatement:
                          type: string
                          description: |
                            Controls which SQL statements are logged (log_statement parameter).
                            - none (default): No statement logging, rely on auto_explain for slow queries
                            - ddl: Log DDL statements (CREATE, ALTER, DROP) for schema change auditing
                            - mod: Log DDL + data modifications (INSERT, UPDATE, DELETE)
                            - all: Log ALL SQL statements (WARNING: 10-30% overhead)
                          enum:
                            - none
                            - ddl
                            - mod
                            - all
                          default: none
                    databases:
                      type: array
                      description: Databases to create
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            description: Database name
                          owner:
                            type: string
                            description: Database owner
                        required:
                          - name
                          - owner
                    roles:
                      type: array
                      description: Database roles to create
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            description: Role name
                          comment:
                            type: string
                            description: Role comment
                          superuser:
                            type: boolean
                            description: Is the role a superuser
                          inRoles:
                            type: array
                            description: Roles this role is a member of
                            items:
                              type: string
                        required:
                          - name
                          - superuser
                    atlasSchema:
                      type: object
                      description: Atlas schema migration configuration
                      properties:
                        url:
                          type: string
                          description: Git repository URL
                        ref:
                          type: string
                          description: Git reference (branch/tag)
                        path:
                          type: string
                          description: Path to migrations in repository
                    postgresql:
                      type: object
                      description: PostgreSQL configuration
                      properties:
                        parameters:
                          type: object
                          description: Custom Postgres parameters
                          additionalProperties: true
                        pg_hba:
                          type: array
                          description: Custom pg_hba.conf entries
                          items:
                            type: string
                    backup:
                      type: object
                      description: Backup configuration
                      properties:
                        schedule:
                          type: string
                          description: Backup schedule in cron format
                          pattern: "^[0-9*/ -]+$"
                        retentionPolicy:
                          type: string
                          description: Backup retention policy
                          pattern: "^[0-9]+[dmy]$"
                          default: "15d"
                        bucketName:
                          type: string
                          description: S3 bucket name for backups
                s3Bucket:
                  type: object
                  description: S3 bucket configuration
                  properties:
                    enabled:
                      type: boolean
                      description: Enable S3 bucket
                      default: false
                    providerConfigRef:
                      type: object
                      description: Provider configuration reference
                      properties:
                        name:
                          type: string
                          description: Provider config name
                        namespace:
                          type: string
                          description: Provider config namespace
                      required:
                        - name
                        - namespace
                    region:
                      type: string
                      description: AWS region
                      pattern: "^[a-z]+-[a-z]+-[0-9]+$"
                    permissions:
                      type: string
                      description: Bucket permissions
                      enum: ["readwrite", "readonly", "custom"]
                      default: "readwrite"
                    customPolicy:
                      type: string
                      description: Custom IAM policy JSON (when permissions is custom)
                    versioning:
                      type: boolean
                      description: Enable bucket versioning
                      default: false
                    retentionDays:
                      type: integer
                      description: Object retention days
                      minimum: 1
                      maximum: 365
                # External Secrets configuration
                externalSecrets:
                  type: array
                  description: Create ExternalSecrets from AWS Secrets Manager (imports all keys from each secret path using dataFrom)
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Kubernetes Secret name (should match what's referenced in env/envFrom)
                      remoteRef:
                        type: string
                        description: Path to secret in AWS Secrets Manager (e.g., "apps/myapp/secrets")
                      refreshInterval:
                        type: string
                        description: How often to refresh from AWS Secrets Manager
                        pattern: "^[0-9]+(s|m|h)$"
                        default: "1h"
                    required:
                      - name
                      - remoteRef
                # Observability configuration
                observability:
                  type: object
                  description: Observability configuration (metrics, logs, traces)
                  properties:
                    traces:
                      type: object
                      description: Distributed tracing configuration
                      properties:
                        enabled:
                          type: boolean
                          description: Enable distributed tracing with OpenTelemetry
                          default: false
                        endpoint:
                          type: string
                          description: "OTLP traces endpoint with full path including protocol (e.g., 'http://host:port/path'). Defaults to VictoriaTraces in observability namespace."
                        samplingRate:
                          type: number
                          description: Trace sampling rate (0.0 to 1.0, where 1.0 = 100% of traces)
                          minimum: 0.0
                          maximum: 1.0
                          default: 1.0
                    metrics:
                      type: object
                      description: Metrics export configuration
                      properties:
                        enabled:
                          type: boolean
                          description: Enable metrics export with OpenTelemetry
                          default: false
                        endpoint:
                          type: string
                          description: "OTLP metrics endpoint with full path (e.g., 'http://host:port/basepath/v1/metrics'). Per OTLP spec, this is used as-is without modification. Defaults to vmagent in observability namespace."
                        path:
                          type: string
                          description: Metrics scrape path
                          default: "/metrics"
                        interval:
                          type: string
                          description: Metrics scrape interval
                          pattern: "^[0-9]+(s|m|h)$"
                          default: "30s"
                    alertingRules:
                      type: object
                      description: VictoriaMetrics alerting rules (creates VMRule resource)
                      properties:
                        groups:
                          type: array
                          description: Alert rule groups
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                                description: Group name
                              interval:
                                type: string
                                description: Evaluation interval
                                pattern: "^[0-9]+(s|m|h)$"
                              rules:
                                type: array
                                description: List of alerting and recording rules
                                items:
                                  type: object
                                  x-kubernetes-preserve-unknown-fields: true
                            required:
                              - name
                              - rules
              required:
                - image
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                observedGeneration:
                  type: integer
          required:
            - spec
