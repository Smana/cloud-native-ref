kcl_options:
  - key: params
    value:
      ocds:
        # SPEC-002 FR-002 latch fixture: the Deployment is deliberately NOT
        # Available while the AIGatewayRoute is already present in ocds below.
        # This exercises the latch end-to-end — the route must still render in
        # `items` because it was already observed (never withdrawn on a blip).
        xplane-qwen3-8b-deployment:
          Resource:
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: xplane-qwen3-8b
              namespace: llm
            status:
              conditions:
                - type: Available
                  status: "False"
                  reason: MinimumReplicasUnavailable
              availableReplicas: 0
              readyReplicas: 0
              replicas: 1
        # AIGatewayRoute already reconciled (Accepted=True): drives both the
        # latch (route stays rendered though the Deployment is down) and the
        # krm.kcl.dev/ready annotation on the rendered route. Keyed under the
        # real composition-resource-name so a suffix drift breaks the wiring
        # test (test_gateway_route_latch_integration).
        xplane-qwen3-8b-gateway-airoute:
          Resource:
            apiVersion: aigateway.envoyproxy.io/v1alpha1
            kind: AIGatewayRoute
            metadata:
              name: xplane-qwen3-8b
              namespace: llm
            status:
              conditions:
                - type: Accepted
                  status: "True"
                  reason: Accepted
        xplane-qwen3-8b-service:
          Resource:
            apiVersion: v1
            kind: Service
            metadata:
              name: xplane-qwen3-8b
              namespace: llm
            spec:
              clusterIP: "172.20.42.10"
        xplane-qwen3-8b-scaledobject:
          Resource:
            apiVersion: keda.sh/v1alpha1
            kind: ScaledObject
            metadata:
              name: xplane-qwen3-8b
              namespace: llm
            status:
              conditions:
                - type: Ready
                  status: "True"
                  reason: ScaledObjectReady
        xplane-qwen3-8b-httproute:
          Resource:
            apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: xplane-qwen3-8b
              namespace: llm
            status:
              parents:
                - conditions:
                    - type: Accepted
                      status: "True"
                      reason: Accepted
        xplane-qwen3-8b-preload-job:
          Resource:
            apiVersion: batch/v1
            kind: Job
            metadata:
              name: xplane-qwen3-8b-preload-main
              namespace: llm
            status:
              succeeded: 1
      ctx:
        "apiextensions.crossplane.io/environment":
          clusterName: "mycluster-0"
          region: "eu-west-3"
          environment: "production"
      # Desired composite — function-kcl exposes this so the composition can
      # patch XR status (SPEC-002 status.modelEndpoint). Crossplane supplies it
      # at runtime; here it is a minimal stand-in for local `kcl run`/`kcl test`.
      dxr:
        apiVersion: cloud.ogenki.io/v1alpha1
        kind: InferenceService
        metadata:
          name: "xplane-qwen3-8b"
          namespace: "llm"
      oxr:
        metadata:
          name: "xplane-qwen3-8b"
          namespace: "llm"
        spec:
          model:
            repository: "Qwen/Qwen3-8B"
            revision: "main"
            quantization: "fp8"
            contextWindow: 32768
            preload:
              enabled: true
          gpu:
            count: 1
            minVRAM: "16Gi"
          routing:
            tier: "medium"
            specialty: "general"
          scaling:
            minReplicas: 0
            maxReplicas: 3
            scaleToZeroIdleSeconds: 600
            scaleUpQueueDepthThreshold: 4
          cache:
            kvOffload:
              enabled: true
              sizeGB: 16
            prefixCache:
              enabled: true
          route:
            enabled: true
            parentGateway: "platform-tailscale-general"
            parentGatewayNamespace: "infrastructure"
            hostname: "qwen3"
          # SPEC-002: composition-owned AI Gateway routing with weighted LoRA
          # canaries. 10% + 15% of base-model traffic is rewritten to the two
          # adapters (verbatim modelNameOverride), leaving the base model 75%;
          # explicit requests for either adapter name stay pinned 100% on the
          # base pod. Adapter names are distinct and the weights sum to <= 99.
          gateway:
            enabled: true
            canaries:
              - adapter: xplane-qwen3-8b-adapter-a
                weightPercent: 10
              - adapter: xplane-qwen3-8b-adapter-b
                weightPercent: 15
          externalSecrets:
            - name: hf-token
              remoteRef: /platform/llm/hf_token
              refreshInterval: 1h
          observability:
            metrics:
              interval: "30s"
          resources:
            requests:
              cpu: "2"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "32Gi"
          # Adapter names are fully-qualified (claim-name-prefixed by
          # convention, as on the real claims — e.g. xplane-qwen-coder-sql-dpo).
          # vLLM serves each under this name verbatim; the AI Gateway pin rules
          # and canary modelNameOverride use it as-is (no extra prefixing).
          loraAdapters:
            - name: xplane-qwen3-8b-adapter-a
              repository: org/test-adapter-a
              revision: main
            - name: xplane-qwen3-8b-adapter-b
              repository: org/test-adapter-b
              revision: abc1234
