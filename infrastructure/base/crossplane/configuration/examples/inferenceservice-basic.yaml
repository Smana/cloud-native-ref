---
# Basic InferenceService — smallest viable model
# Minimal claim: HF model, 1 GPU, defaults applied (min=1 always-warm per
# SPEC-001), no preload Job, vLLM downloads from HuggingFace at boot
# (slower first-start; fine for low-traffic / one-off models).
apiVersion: cloud.ogenki.io/v1alpha1
kind: InferenceService
metadata:
  name: xplane-qwen3-8b-basic
  namespace: llm
spec:
  model:
    repository: Qwen/Qwen3-8B
    revision: main
    quantization: fp16
    contextWindow: 8192
  gpu:
    count: 1
  routing:
    tier: medium
    specialty: general
