---
# Complete InferenceService — all features enabled
# Production-grade: S3 Files weights mount, KEDA prometheus triggers on
# leading saturation signals (SPEC-001), KV-offload + prefix-cache,
# per-model HTTPRoute, ExternalSecret for HF token, custom resource limits.
apiVersion: cloud.ogenki.io/v1alpha1
kind: InferenceService
metadata:
  name: xplane-qwen3-8b
  namespace: llm
spec:
  model:
    repository: Qwen/Qwen3-8B
    revision: main
    quantization: fp8
    contextWindow: 32768
    # vLLM batch cap; the `running/max-num-seqs` ratio scaling
    # trigger uses this as its denominator.
    maxNumSeqs: 32
    preload:
      enabled: true   # CL-3 (rec A) — composition renders one-shot Job
    # SPEC-005 (phase 1) — opt-in Run:ai Model Streamer. Loads weights with
    # `--load-format runai_streamer`, reading the SAME preloaded PVC path
    # (/models/<revision>) concurrently to cut pod-ready → first-token
    # cold-start. No storage change, no new pod/IAM/S3/PVC/Secret; the
    # streamer is already bundled in vllm/vllm-openai:v0.25.0. Off by default.
    streaming:
      enabled: true
      concurrency: 16   # optional — --model-loader-extra-config '{"concurrency":16}'
  # SPEC-003 escape hatch — verbatim vLLM flags appended after composition-managed
  # args; reserved flags rejected at admission (see kcl/inference-service/README.md "Engine args").
  engineArgs:
    - --kv-cache-dtype=fp8
    - --enforce-eager
  gpu:
    count: 1
    minVRAM: 16Gi
  routing:
    tier: medium
    specialty: general
  # SPEC-001 default: min=1 (always warm). KEDA ScaledObject with
  # prometheus triggers on running-ratio + kv_cache_usage_perc reacts
  # ahead of saturation. min=0 is still allowed per-claim but accepts
  # first-request failure (no queueing layer).
  scaling:
    minReplicas: 1
    maxReplicas: 3
  cache:
    kvOffload:
      enabled: true
      sizeGB: 16
    prefixCache:
      enabled: true
  route:
    enabled: true
    # The parent Gateway is owned by the composition (SPEC-002), not the claim.
    hostname: qwen3
  # LoRA adapter served over the base model (same pod, zero extra GPU).
  # Downloaded by the preload Job into /models/loras/<name>/ and served by
  # vLLM under this name verbatim. Adapter names are fully-qualified by
  # convention (claim-name-prefixed), matching the real fleet claims.
  loraAdapters:
    - name: xplane-qwen3-8b-sql-expert
      repository: org/qwen3-sql-lora
      revision: main
  # SPEC-002: composition-owned Envoy AI Gateway routing with weighted LoRA
  # canaries. The composition renders Backend + AIServiceBackend(s) +
  # AIGatewayRoute (parentRef ai-gateway/envoy-ai-gateway-system). 15% of
  # base-model (xplane-qwen3-8b) traffic is rewritten to the adapter
  # xplane-qwen3-8b-sql-expert (verbatim modelNameOverride); explicit requests
  # for that adapter name stay pinned 100% on the base pod. The AIGatewayRoute
  # is latched on Deployment readiness.
  gateway:
    enabled: true
    canaries:
      - adapter: xplane-qwen3-8b-sql-expert
        weightPercent: 15
  # Shared S3 Files filesystem (provisioned out-of-band by
  # opentofu/llm-platform/). subPath defaults to the claim name; set
  # explicitly here if a custom directory layout is desired.
  weightsFileSystem:
    subPath: xplane-qwen3-8b
  externalSecrets:
    - name: hf-token
      remoteRef: /platform/llm/hf_token
      refreshInterval: 1h
  envFromSecrets:
    - hf-token
  observability:
    metrics:
      interval: "30s"
  resources:
    requests:
      cpu: "2"
      memory: 16Gi
    limits:
      cpu: "8"
      memory: 32Gi
