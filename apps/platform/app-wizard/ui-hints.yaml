# ui-hints.yaml — presentation overlay for the App Wizard form (FR-003).
#
# This file controls ONLY how fields are presented (tier, group, label, help,
# example, order). It never carries field knowledge — types, enums, defaults,
# min/max and descriptions all come from the App XRD via the schema pipeline.
#
# A field absent from `fields` defaults to the "advanced" tier and is never
# hidden (FR-003). Tiers: basic (first screen) | advanced (behind an expander)
# | expert (behind an "expert" toggle).
#
# DRIFT GUARD: every key under `fields` MUST exist in the App XRD. The Go test
# TestUIHintsNoDriftFromXRD (internal/schema/drift_test.go) fails the build if a
# hint references a field the XRD does not have — so this overlay can never drift
# from the schema. (This branch is rebased onto SPEC-007, so the v0.2.0 workload
# fields — type, schedule, cron, sidecars, initContainers, persistence — exist in
# the XRD and are hinted below.)

groups:
  - id: workload
    label: Workload
    tier: basic
    order: 10
  - id: exposure
    label: Networking & exposure
    tier: basic
    order: 20
  - id: containers
    label: Containers & command
    tier: advanced
    order: 15
  - id: scheduling
    label: Schedule
    tier: advanced
    order: 16
  - id: scaling
    label: Scaling & resources
    tier: advanced
    order: 30
  - id: data
    label: Data & storage
    tier: advanced
    order: 40
  - id: config
    label: Configuration & secrets
    tier: advanced
    order: 50
  - id: security
    label: Security & policies
    tier: expert
    order: 60
  - id: observability
    label: Observability
    tier: expert
    order: 70

