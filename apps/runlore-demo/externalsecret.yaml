apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-api-db
  namespace: runlore-demo
spec:
  refreshInterval: 1m
  secretStoreRef:
    kind: ClusterSecretStore
    name: clustersecretstore
  target:
    name: payment-api-db
    creationPolicy: Owner
  # Pulls the payment-api database credentials from AWS Secrets Manager.
  # NOTE: this key is not provisioned in Secrets Manager, so the sync fails
  # (ResourceNotFound) and the payment-api-db Secret is never created.
  dataFrom:
    - extract:
        key: apps/payment-api/db-credentials
