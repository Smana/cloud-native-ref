apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: runlore-demo
  labels:
    app.kubernetes.io/name: payment-api
    app.kubernetes.io/part-of: runlore-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-api
        app.kubernetes.io/part-of: runlore-demo
    spec:
      containers:
        - name: payment-api
          # podinfo — a small, well-known demo microservice.
          image: ghcr.io/stefanprodan/podinfo:6.7.1
          # Database credentials, synced from AWS Secrets Manager by the
          # payment-api-db ExternalSecret. The container cannot start until this
          # Secret exists (CreateContainerConfigError while it is missing).
          envFrom:
            - secretRef:
                name: payment-api-db
          ports:
            - name: http
              containerPort: 9898
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
