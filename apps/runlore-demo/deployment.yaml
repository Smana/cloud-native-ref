apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: runlore-demo
  labels:
    app.kubernetes.io/name: checkout-api
    app.kubernetes.io/part-of: runlore-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-api
        app.kubernetes.io/part-of: runlore-demo
    spec:
      containers:
        - name: checkout-api
          # podinfo — a small, well-known demo microservice.
          image: ghcr.io/stefanprodan/podinfo:6.7.1
          ports:
            - name: http
              containerPort: 9898
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
