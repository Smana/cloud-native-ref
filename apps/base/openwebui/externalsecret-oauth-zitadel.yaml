---
# OAuth client credentials for OpenWebUI -> Zitadel SSO. Stored in
# AWS Secrets Manager at `apps/openwebui/oauth-zitadel` as a JSON
# blob with `client_id` + `client_secret` keys; the dataFrom.extract
# fans them out into env-friendly key=value pairs in the rendered
# Kubernetes Secret. OpenWebUI then references those keys via
# valueFrom.secretKeyRef in app.yaml's env block.
#
# Rotate via Zitadel UI -> Application -> "Reset client secret"
# (invalidates active sessions; users re-login on next page load).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openwebui-oauth-zitadel
  namespace: apps
spec:
  dataFrom:
    - extract:
        conversionStrategy: Default
        key: apps/openwebui/oauth-zitadel
  refreshInterval: 20m
  secretStoreRef:
    kind: ClusterSecretStore
    name: clustersecretstore
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: openwebui-oauth-zitadel
