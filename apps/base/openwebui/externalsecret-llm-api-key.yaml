---
# OpenWebUI's API key for the AI Gateway. Pulled from the same AWS SM
# JSON object as the gateway-side `ai-gateway-api-keys` secret in
# `envoy-ai-gateway-system` (key: openwebui_apikey). Both this client
# Secret and the gateway-side Secret store the raw key — Envoy
# Gateway's `apiKeyAuth.extractFrom: ["Authorization"]` strips the
# Bearer scheme before comparison.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openwebui-llm-api-key
  namespace: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: clustersecretstore
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: openwebui-llm-api-key
    template:
      type: Opaque
      data:
        OPENAI_API_KEY: "{{ .openwebui_apikey }}"
  data:
    - secretKey: openwebui_apikey  # pragma: allowlist secret
      remoteRef:
        key: platform/llm/api-keys
        property: openwebui_apikey  # pragma: allowlist secret
