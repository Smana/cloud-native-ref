apiVersion: cloud.ogenki.io/v1alpha1
kind: App
metadata:
  name: podinfo
  namespace: apps
spec:
  # Minimum required: container image
  image:
    repository: stefanprodan/podinfo
    tag: "6.9.2"

  # Health probes configured for podinfo's actual endpoints
  healthProbes:
    liveness:
      path: "/healthz"
    readiness:
      path: "/readyz"

  # Simple HTTP service
  route:
    port: 9898
    hostname: "podinfo.priv.cloud.ogenki.io"
