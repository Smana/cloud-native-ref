# Shared S3 Files mount for ALL InferenceService claims (per ADR-0004).
# A single PV+PVC pair (RWM) lives in the `llm` namespace; each
# InferenceService composition mounts this PVC with a per-claim subPath
# under /models in its serving Deployment + preload Job.
#
# Provisioned out-of-band (not via a Crossplane composition): the PV is
# cluster-scoped and v2 namespaced XRs cannot render cluster-scoped resources.
# (Separately, provider-upjet-aws still ships no s3files CRDs as of v2.6.0 — but
# the scope constraint above holds regardless, so this stays out-of-band.)
#
# The volumeHandle format is `s3files:<filesystem_id>::<access_point_id>`.
# It is regenerated by every fresh `tofu apply` in opentofu/llm-platform/,
# so it MUST be updated here after a rebuild:
#
#     tofu -chdir=opentofu/llm-platform output -raw volume_handle
#
# NOTE: spec.csi.volumeHandle is immutable. Changing it here is not enough —
# the existing PV+PVC must be deleted so Flux recreates them, or every pod
# mount fails against the old (now nonexistent) filesystem id.
#
# TODO: close this manual loop — publish volume_handle to AWS Secrets Manager
# from the tofu stack, pull it in with External Secrets, and reference it here
# via Flux postBuild substitution instead of hardcoding.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: llm-models
  labels:
    app.kubernetes.io/part-of: ai
    app.kubernetes.io/component: storage
spec:
  # Capacity is nominal — S3 Files is unmetered at the PV level.
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  # Retain — the underlying S3 Files data outlives any single PVC delete.
  persistentVolumeReclaimPolicy: Retain
  storageClassName: s3files-llm-models
  csi:
    driver: efs.csi.aws.com
    volumeHandle: s3files:fs-09c78abe09076e43e::fsap-08c1a3dc6971a7bff
  claimRef:
    namespace: llm
    name: llm-models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llm-models
  namespace: llm
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: s3files-llm-models
  resources:
    requests:
      storage: 100Gi
  volumeName: llm-models
