---
# Shared HuggingFace token for the LLM platform.
# Pulled from AWS Secrets Manager at /platform/llm/hf_token (FR-011).
# All InferenceService claims envFrom this Secret via spec.envFromSecrets:
#   ["hf-token"], avoiding per-claim ExternalSecret name collisions.
# The vLLM container uses HF_TOKEN at startup (when weights are downloaded
# from HF directly); the composition-rendered preload Job uses it during
# the one-shot upload from HF to s3://${region}-ogenki-llm-models/.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hf-token
  namespace: llm
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: clustersecretstore
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: hf-token
  dataFrom:
    - extract:
        conversionStrategy: Default
        key: /platform/llm/hf_token
