---
# Shared ServiceAccount used by composition-rendered preload Jobs (CL-3 rec A).
# Bound to the writable EPI xplane-llm-models-preload (security/base/epis-llm/llm-models-preload.yaml).
# Inference pods do NOT use this SA — they use per-claim SAs with read-only EPIs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: xplane-llm-models-preload
  namespace: llm
  labels:
    app.kubernetes.io/name: xplane-llm-models-preload
    app.kubernetes.io/part-of: ai
    app.kubernetes.io/component: weights-preload
