---
# Guardrail model — currently idle, and honest about it.
#
# CL-2 rec A wired LlamaGuard as the post-filter on every response, but the
# upstream Semantic Router chart has no first-class output-side hook. That never
# landed, so nothing dispatches here automatically:
#
#   * there is no `guardrail` category in the Semantic Router config, and this
#     model appears in NO decision rule — `model: MoM` will never select it;
#   * input-side jailbreak filtering is done by the router's own in-pod
#     `prompt_guard` BERT classifier (on CPU), which BLOCKS rather than routes.
#
# So this claim holds one of the four GPUs in the gpu-l4 NodePool cap while
# being reachable only by naming it explicitly. minReplicas is 1 (the platform
# default) — it is NOT cold, whatever an older version of this comment claimed.
#
# Resolve it one way or the other: wire an output-side hook and keep it warm, or
# drop the claim and give the GPU back. Tracked in docs/ai.md "Known gaps".
apiVersion: cloud.ogenki.io/v1alpha1
kind: InferenceService
metadata:
  name: xplane-llamaguard3-1b
  namespace: llm
spec:
  model:
    repository: meta-llama/Llama-Guard-3-1B
    # Pinned commit SHA — see qwen-coder.yaml for rationale.
    revision: acf7aafa60f0410f8f42b1fa35e077d705892029  # pragma: allowlist secret
    quantization: fp16
    contextWindow: 8192
    # 1B fp16 leaves plenty of L4 headroom for high concurrency.
    maxNumSeqs: 64
    preload:
      enabled: true
  gpu:
    count: 1
    minVRAM: 4Gi
  routing:
    tier: small
    specialty: guardrail
  # Production-realistic scaling (composition v0.5.0+, SPEC-001).
  # min=1 even though guardrail traffic is bursty: keeps the
  # post-filter ready when it's invoked and avoids the 0→1 cold start
  # on the (cheap) 1B model.
  scaling:
    minReplicas: 1
    maxReplicas: 3
  cache:
    prefixCache:
      enabled: true
  envFromSecrets:
    - hf-token
  observability:
    metrics:
      interval: "30s"
  resources:
    requests:
      cpu: "1"
      memory: "8Gi"
    limits:
      cpu: "4"
      memory: "16Gi"
