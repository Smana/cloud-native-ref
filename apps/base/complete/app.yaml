apiVersion: cloud.ogenki.io/v1alpha1
kind: App
metadata:
  name: image-gallery
  namespace: apps
spec:
  image:
    repository: ghcr.io/smana/image-gallery
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  onDemand: false
  runAsNonRoot: true
  spreadAcrossZones: true
  antiAffinityPreset: soft
  automountServiceAccountToken: false
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop: ["ALL"]
    enableWritableTmp: true

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  pdb:
    enabled: true
    minAvailable: 1
    unhealthyPodEvictionPolicy: AlwaysAllow

  route:
    port: 8080
    internetFacing: true

  networkPolicies:
    enabled: true
    ingress:
      - fromEndpoints:
          - matchLabels:
              "io.kubernetes.pod.namespace": "gateway-system"
              "app.kubernetes.io/name": "cilium-gateway"
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP

      - fromEndpoints:
          - matchLabels:
              "io.kubernetes.pod.namespace": "observability"
              "app.kubernetes.io/name": "prometheus"
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP
    egress:
      - toEndpoints:
          - matchLabels:
              "io.kubernetes.pod.namespace": "kube-system"
              "k8s-app": "kube-dns"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
      - toEndpoints:
          - matchLabels:
              "cnpg.io/cluster": "image-gallery-sqlinstance-cnpg-cluster"
        toPorts:
          - ports:
              - port: "5432"
                protocol: TCP
      - toFQDNs:
          - matchPattern: "*.github.com"
          - matchName: "s3.eu-west-3.amazonaws.com"
          - matchPattern: "*.amazonaws.com"
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
      - toEndpoints:
          - matchLabels:
              "io.kubernetes.pod.namespace": "default"
              component: "apiserver"
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP

  kvStore:
    enabled: true
    size: small
    type: valkey

  sqlInstance:
    enabled: true
    size: small
    storageSize: 20Gi
    instances: 2
    primaryUpdateStrategy: unsupervised
    createSuperuser: false
    roles:
      - name: image-gallery-app
        comment: "Application user for image-gallery"
        superuser: false
        inRoles:
          - pg_monitor
    databases:
      - name: image-gallery
        owner: image-gallery-app
    atlasSchema:
      url: "https://github.com/Smana/image-gallery.git"
      ref: "main"
      path: "internal/platform/database/migrations"
    postgresql:
      parameters:
        max_connections: 100
        shared_buffers: "256MB"
      pg_hba:
        - "host all all 0.0.0.0/0 md5" # Allow password auth from all IPs (within cluster)
    backup:
      schedule: "0 2 * * *"
      bucketName: image-gallery-db-backups
      retentionPolicy: "30d"
