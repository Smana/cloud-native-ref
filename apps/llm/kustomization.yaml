apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# LLM apps gated by the LLM umbrella Flux Kustomization
# (see clusters/mycluster-0/llm-platform.yaml). The base trees are shared with
# everything else under apps/base/, but only this overlay (and the umbrella
# child Kustomization that points at it) brings them into a cluster.
resources:
  - ../base/ai/llm
  - ../base/openwebui
