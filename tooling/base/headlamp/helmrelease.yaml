apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
spec:
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: headlamp
      version: "0.41.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
      interval: 12h
  values:
    config:
      pluginsDir: /build/plugins
      oidc:
        secret:
          create: false
        externalSecret:
          enabled: true
          name: "headlamp-envvars"
    # CONTAINER security context for the main `headlamp` container ("Headlamp
    # containers Security Context" — chart values.yaml; `podSecurityContext` is
    # the pod one). Merged with the chart default (runAsNonRoot / runAsUser 100 /
    # runAsGroup 101 / privileged false), which omits allowPrivilegeEscalation.
    securityContext:
      allowPrivilegeEscalation: false

    # The chart renders `initContainers` verbatim (toYaml), so these three carry
    # their own securityContext — .Values.securityContext does NOT reach them.
    #
    # Images are pinned instead of tracking `:latest`. Each pinned tag below was
    # verified to resolve to the SAME digest `:latest` currently points at, so
    # this pins today's behaviour rather than changing it.
    initContainers:
      - name: flux-plugin
        command:
          - /bin/sh
          - -c
          - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
        # was :latest — sha256:055377b9…667fdccb
        image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
          - mountPath: /build/plugins
            name: headlamp-plugins

      - name: cert-manager-plugin
        command:
          - /bin/sh
          - -c
          - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
        # was :latest — sha256:d7d0321a…476b43fe
        image: ghcr.io/headlamp-k8s/headlamp-plugin-cert-manager:v0.1.0
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
          - mountPath: /build/plugins
            name: headlamp-plugins

      - name: ai-assistant-plugin
        command:
          - /bin/sh
          - -c
          - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
        # was :latest — sha256:6e66f8b7…bc335aa1
        image: ghcr.io/headlamp-k8s/headlamp-plugin-ai-assistant:v0.2.0-alpha
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
          - mountPath: /build/plugins
            name: headlamp-plugins

    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 300m

    volumeMounts:
      - mountPath: /build/plugins
        name: headlamp-plugins

    volumes:
      - name: headlamp-plugins
        emptyDir: {}
