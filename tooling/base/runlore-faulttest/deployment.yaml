apiVersion: apps/v1
kind: Deployment
metadata:
  name: faulttest
  labels:
    app: faulttest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: faulttest
  template:
    metadata:
      labels:
        app: faulttest
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          # COMMIT A: a healthy, pullable image so the Kustomization reaches Ready
          # and records lastAppliedRevision. COMMIT B flips this to a bad image so
          # what_changed has a real before->after git diff to attribute the break.
          # (Phase-B what_changed diff demo — TEMPORARY, reverted after.)
          image: registry.k8s.io/pause:3.9
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
