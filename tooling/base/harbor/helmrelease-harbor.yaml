apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
spec:
  releaseName: harbor
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: harbor
      sourceRef:
        kind: HelmRepository
        name: harbor
      version: "1.18.3"
  interval: 10m0s
  install:
    remediation:
      retries: 3
  # The harbor chart renders `strategy.rollingUpdate: null` on every Deployment
  # even when updateStrategy.type=Recreate, which the API server rejects
  # ("rollingUpdate may not be specified when type is Recreate") on the RWO
  # jobservice/registry Deployments. Strip the stray key with $retainKeys so only
  # `type: Recreate` remains.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: harbor-jobservice
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: harbor-jobservice
              spec:
                strategy:
                  $retainKeys:
                    - type
                  type: Recreate
          - target:
              kind: Deployment
              name: harbor-registry
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: harbor-registry
              spec:
                strategy:
                  $retainKeys:
                    - type
                  type: Recreate
  values:
    fullnameOverride: "harbor"
    expose:
      type: clusterIP
      tls:
        auto:
          commonName: "ogenki"

    externalURL: https://harbor.${private_domain_name}

    # jobservice (job-logs) and registry use RWO EBS PVCs. The chart's default
    # RollingUpdate strategy starts a new pod before terminating the old one, so
    # the new pod Multi-Attach-deadlocks on the single-attach volume and every
    # `helm upgrade` times out waiting for the rollout. Recreate terminates the
    # old pod first (brief upgrade downtime, acceptable for an internal registry).
    updateStrategy:
      type: Recreate

    persistence:
      enabled: true
      imageChartStorage:
        # An issue prevents from using EKS Pod Identity: https://github.com/goharbor/harbor/pull/18686
        # Currently this is not possible to push to S3 bucket
        type: s3
        s3:
          region: ${region}
          bucket: ${region}-ogenki-harbor

    existingSecretAdminPassword: harbor-admin-password
    existingSecretAdminPasswordKey: password

    registry:
      serviceAccountName: harbor
      registry:
        # See the iam-user.yaml file for the creation of the user and the policy
        extraEnvVars:
          - name: REGISTRY_STORAGE_S3_ACCESSKEY
            valueFrom:
              secretKeyRef:
                name: xplane-harbor-access-key
                key: username
          - name: REGISTRY_STORAGE_S3_SECRETKEY
            valueFrom:
              secretKeyRef:
                name: xplane-harbor-access-key
                key: password

    portal:
      resources:
        limits:
          memory: 300Mi
        requests:
          cpu: 300m
          memory: 300Mi

    database:
      type: external
      external:
        host: "xplane-harbor-cnpg-cluster-rw"
        port: "5432"
        username: "harbor"
        coreDatabase: "registry"
        existingSecret: "xplane-harbor-cnpg-registry" # pragma: allowlist secret
        sslmode: "require"

    redis:
      type: external
      external:
        addr: "harbor-valkey-primary:6379"
        username: "user"
        existingSecret: "harbor-valkey-password"

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

    cache:
      enabled: true
      expireHours: 24
