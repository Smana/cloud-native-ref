apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gha-runner-scale-set-controller
  namespace: tooling
spec:
  releaseName: gha-runner-scale-set-controller
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: "0.14.2"
      sourceRef:
        kind: HelmRepository
        name: gha-runner-scale-set
  interval: 5m
  install:
    crds: "Skip"
    remediation:
      retries: 3
  values:
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 128Mi

    # CONTAINER security context for the `manager` container
    # (`podSecurityContext` is the pod one). The chart ships both empty. The
    # controller only reconciles AutoscalingRunnerSets against the Kubernetes and
    # GitHub APIs — the privileged work happens in the runner pods it creates,
    # not here.
    securityContext:
      allowPrivilegeEscalation: false

    flags:
      logLevel: "debug"
      logFormat: "json"
