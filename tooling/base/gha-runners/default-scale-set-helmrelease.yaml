apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: default-gha-runner-scale-set
spec:
  releaseName: default-gha-runner-scale-set
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.9.3"
      sourceRef:
        kind: HelmRepository
        name: gha-runner-scale-set
  interval: 10m0s
  install:
    remediation:
      retries: 3
  values:
    runnerGroup: "default"
    githubConfigUrl: "https://github.com/Smana/cloud-native-ref"
    githubConfigSecret: gha-runner-scale-set
    maxRunners: 5

    ## We'll probably want to use our internal PKI for this.
    # githubServerTLS:
    #   certificateFrom:
    #     configMapKeyRef:
    #       name: config-map-name
    #       key: ca.crt
    #   runnerMountPath: /usr/local/share/ca-certificates/
    template:
      spec:
        securityContext:
          runAsUser: 1001
          runAsGroup: 123
          fsGroup: 1000

        # Pin the runner image. The chart's own default is
        # `ghcr.io/actions/actions-runner:latest`, which Polaris flags
        # (tagNotSpecified) and which makes runner rollouts unreproducible.
        #
        # This list REPLACES the chart default (Helm replaces lists, it does not
        # merge them), so name/image/command mirror that default exactly, with
        # only the tag pinned. `2.335.1` was verified to resolve to the same
        # digest `:latest` points at today (sha256:08c30b0a…bda2c29), so this
        # pins current behaviour rather than changing it.
        # The chart still injects env/volumeMounts for this container itself.
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:2.336.0
            command: ["/home/runner/run.sh"]

    containerMode:
      type: "kubernetes"
      kubernetesModeWorkVolumeClaim:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "gp3"
        resources:
          requests:
            storage: 10Gi
