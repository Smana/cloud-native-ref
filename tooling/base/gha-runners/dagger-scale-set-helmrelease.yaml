apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dagger-gha-runner-scale-set
spec:
  releaseName: dagger-gha-runner-scale-set
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.9.3"
      sourceRef:
        kind: HelmRepository
        name: gha-runner-scale-set
  interval: 10m0s
  install:
    remediation:
      retries: 3
  values:
    runnerGroup: "default"
    githubConfigUrl: "https://github.com/Smana/cloud-native-ref"
    githubConfigSecret: gha-runner-scale-set
    maxRunners: 5

    containerMode:
      type: "dind"

    template:
      spec:
        # Pin the runner image — see default-scale-set-helmrelease.yaml for the
        # full rationale. In dind mode this tag also feeds the generated
        # `init-dind-externals` initContainer, which copies the runner externals
        # out of this same image (_helpers.tpl "dind-init-container"), so pinning
        # here clears tagNotSpecified on both containers.
        #
        # The `dind` sidecar keeps its chart-hardcoded `docker:dind` +
        # privileged: true — not overridable from values, hence the Polaris
        # exemption in .polaris.yaml.
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:2.335.1
            command: ["/home/runner/run.sh"]
