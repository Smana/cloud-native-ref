---
# Promptfoo's API key for the AI Gateway. Same source as the gateway-
# side ai-gateway-api-keys secret in `envoy-ai-gateway-system`
# (AWS SM `platform/llm/api-keys`, property `promptfoo_apikey`).
# The promptfoo CronJob's openai provider auto-detects OPENAI_API_KEY
# from the env and sends `Authorization: Bearer <value>`, which the
# Envoy SecurityPolicy matches against the prefixed Secret value.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: promptfoo-llm-api-key
  namespace: promptfoo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: clustersecretstore
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: promptfoo-llm-api-key
    template:
      type: Opaque
      data:
        OPENAI_API_KEY: "{{ .promptfoo_apikey }}"
  data:
    - secretKey: promptfoo_apikey  # pragma: allowlist secret
      remoteRef:
        key: platform/llm/api-keys
        property: promptfoo_apikey  # pragma: allowlist secret
