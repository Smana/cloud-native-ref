apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: runlore-slack
spec:
  # AWS Secrets Manager JSON object runlore/slack-app holds SLACK_BOT_TOKEN
  # (notify.slack.bot_token_env). Posts findings to #alerts via chat.postMessage.
  dataFrom:
    - extract:
        conversionStrategy: Default
        key: runlore/slack-app
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: clustersecretstore
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: runlore-slack
