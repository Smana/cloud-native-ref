apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: tooling
spec:
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: homepage
      version: "2.1.0"
      sourceRef:
        kind: HelmRepository
        name: jameswynn
      interval: 12h
  values:
    # CONTAINER security context for the main container. This chart is a thin
    # wrapper over the bjw-s `common` library chart (v1.5.1), where
    # `securityContext` is "the Security Context for the main container" and
    # `podSecurityContext` is the pod one (lib/controller/_mainContainer.tpl).
    # Neither is set by default, so homepage ran with escalation allowed.
    securityContext:
      allowPrivilegeEscalation: false

    # Enable RBAC for Kubernetes integration
    enableRbac: true

    serviceAccount:
      create: true
      name: homepage

    # Additional ClusterRole permissions for Flux and Crossplane
    extraClusterRoles:
      # Flux resources
      - apiGroups:
          - source.toolkit.fluxcd.io
          - kustomize.toolkit.fluxcd.io
          - helm.toolkit.fluxcd.io
        resources:
          - gitrepositories
          - helmreleases
          - kustomizations
          - helmrepositories
        verbs:
          - get
          - list
      # Flux Operator resources
      - apiGroups:
          - fluxcd.controlplane.io
        resources:
          - fluxinstances
        verbs:
          - get
          - list
      # Crossplane resources
      - apiGroups:
          - apiextensions.crossplane.io
        resources:
          - compositions
          - compositeresourcedefinitions
        verbs:
          - get
          - list
      # Crossplane managed resources
      - apiGroups:
          - cloud.ogenki.io
        resources:
          - "*"
        verbs:
          - get
          - list

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

    env:
      - name: HOMEPAGE_ALLOWED_HOSTS
        value: "home.priv.cloud.ogenki.io"

    config:
      bookmarks:
        # First, next to the App Wizard card: the two things a developer needs the
        # moment the form asks them something they don't know the answer to.
        - For Developers:
            - App Wizard Guide:
                - abbr: WIZ
                  href: https://github.com/Smana/cloud-native-ref/blob/main/docs/app-wizard.md
            - App Claim Examples:
                - abbr: APP
                  href: https://github.com/Smana/cloud-native-ref/tree/main/apps
            - Platform Repo:
                - abbr: GIT
                  href: https://github.com/Smana/cloud-native-ref

        - Cloud Native:
            - Kubernetes Docs:
                - abbr: K8s
                  href: https://kubernetes.io/docs/
            - Crossplane Docs:
                - abbr: XP
                  href: https://docs.crossplane.io/
            - Flux Docs:
                - abbr: Flux
                  href: https://fluxcd.io/flux/
            - Gateway API:
                - abbr: GW
                  href: https://gateway-api.sigs.k8s.io/

        - Observability:
            - VictoriaMetrics:
                - abbr: VM
                  href: https://docs.victoriametrics.com/
            - Cilium:
                - abbr: Cilium
                  href: https://docs.cilium.io/

      services:
        # Deliberately first, and rendered as a single full-width row (see `layout`
        # below): this is the front door for developers. Everything under it is a tool
        # you look at; this is the one thing you *do*. Burying it in Platform Tools
        # alongside Headlamp/Harbor is how self-service goes unused.
        - Ship an App:
            - App Wizard:
                href: https://app-wizard.priv.cloud.ogenki.io
                description: Describe your app in a form — the wizard opens a GitOps pull request for you. No YAML to write.
                icon: mdi-rocket-launch-#38bdf8
                namespace: apps
                app: app-wizard

        - Platform Tools:
            - Headlamp:
                href: https://headlamp.priv.cloud.ogenki.io
                description: Kubernetes Web UI
                icon: headlamp.png
                namespace: tooling
                app: headlamp

            - Harbor:
                href: https://harbor.priv.cloud.ogenki.io
                description: Container & Helm Registry
                icon: harbor.png
                namespace: tooling
                app: harbor

            - PEV2:
                href: https://pev2.priv.cloud.ogenki.io
                description: PostgreSQL Execution Plan Visualizer
                icon: postgres.png
                namespace: tooling
                app: pev2

        - Observability:
            - Grafana:
                href: https://grafana.priv.cloud.ogenki.io
                description: Metrics & Dashboards
                icon: grafana.png
                namespace: observability
                app: grafana

            - Victoria Metrics:
                href: https://vm.priv.cloud.ogenki.io/vmui
                description: Time Series Database
                icon: victoriametrics.png
                namespace: observability
                app: vmsingle

            - Victoria Logs:
                href: https://vl.priv.cloud.ogenki.io/select/vmui
                description: Log Management
                icon: victoriametrics.png
                namespace: observability
                app: victoria-logs-single

            - Victoria Traces:
                href: https://vt.priv.cloud.ogenki.io/select/vmui
                description: Distributed Tracing
                icon: victoriametrics.png
                namespace: observability
                app: vt-single

        - Security & Identity:
            - Zitadel:
                href: https://auth.cloud.ogenki.io
                description: Identity & Access Management
                icon: zitadel.png
                namespace: security
                app: zitadel

            - OpenBao:
                href: https://bao.priv.cloud.ogenki.io:8200
                description: Secrets Management & PKI
                icon: vault.png

        - LLM Platform:
            - Chatbot:
                href: https://chat.priv.cloud.ogenki.io
                description: Self-hosted Qwen models · OpenAI-compatible
                icon: mdi-robot-happy
                namespace: apps
                app: xplane-openwebui

        - Demo Apps:
            - Podinfo:
                href: https://podinfo.priv.cloud.ogenki.io
                description: Demo Application
                icon: mdi-cube
                namespace: apps
                app: xplane-podinfo

            - Image Gallery:
                href: https://image-gallery.priv.cloud.ogenki.io
                description: Demo Image Gallery
                icon: mdi-image-multiple
                namespace: apps
                app: xplane-image-gallery

        - "Cluster: mycluster-0":
            - Flux UI:
                href: https://flux-ui-${cluster_name}.${private_domain_name}
                description: Flux GitOps Dashboard
                icon: flux-cd.png
                namespace: flux-system
                app: flux-operator

            - Hubble UI:
                href: https://hubble-ui-${cluster_name}.${private_domain_name}
                description: Cilium Network Observability
                icon: cilium.png
                namespace: kube-system
                app: hubble-ui

      widgets:
        - search:
            provider: duckduckgo
            target: _blank
            showSearchSuggestions: true

        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: "mycluster-0"
            nodes:
              show: false

        - resources:
            backend: kubernetes
            expanded: true
            cpu: true
            memory: true

      kubernetes:
        mode: cluster
        # Enable Gateway API HttpRoute discovery
        gateway: true
        # Enable standard Ingress discovery
        ingress: true

      settings:
        title: Cloud Native Platform
        headerStyle: boxed
        # Theme and color not set to allow UI switchers
        # Users can change theme/color through the UI
        target: _blank
        language: en
        hideVersion: false
        statusStyle: dot
        quicklaunch:
          searchDescriptions: true
          hideInternetSearch: false
          showSearchSuggestions: true
        layout:
          # Order here is the order groups render in, so "Ship an App" leads. columns: 1
          # gives its single card the full width — it reads as a call to action rather
          # than one tile among twelve. This is what puts self-service above the fold.
          Ship an App:
            style: row
            columns: 1
          Platform Tools:
            style: row
            columns: 3 # 3 since PEV2 joined Headlamp + Harbor
          Observability:
            style: row
            columns: 3
          Security & Identity:
            style: row
            columns: 2
          LLM Platform:
            style: row
            columns: 4
          Demo Apps:
            style: row
            columns: 2
          "Cluster: mycluster-0":
            style: row
            columns: 3
