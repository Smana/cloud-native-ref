apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: runlore-faulttest
  namespace: flux-system
  labels:
    sharding.fluxcd.io/key: apps
spec:
  # TEMPORARY — Phase-B what_changed diff demo. Two-commit sequence: this applies
  # a healthy Deployment first (records lastAppliedRevision), then a follow-up
  # commit breaks the image so RunLore's what_changed has a real before->after to
  # diff. Sourced from git directly so the revision is a git ref. REMOVE after.
  prune: true
  wait: true
  timeout: 2m0s
  interval: 2m0s
  retryInterval: 1m0s
  path: ./tooling/base/runlore-faulttest
  sourceRef:
    kind: GitRepository
    name: flux-system
