apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: runlore-faulttest
  namespace: flux-system
  labels:
    sharding.fluxcd.io/key: apps
spec:
  # TEMPORARY — Phase-B test of RunLore's gitops-failure watch + what_changed.
  # Isolated (no dependsOn, nothing depends on it). wait: true makes a healthy
  # APPLY but failing pod flip this Kustomization Ready=False. Sourced from the
  # git repo directly so lastAppliedRevision is a git ref that what_changed diffs.
  # REMOVE after the test (revert this file + tooling/base/runlore-faulttest).
  prune: true
  wait: true
  timeout: 2m0s
  interval: 5m0s
  retryInterval: 2m0s
  path: ./tooling/base/runlore-faulttest
  sourceRef:
    kind: GitRepository
    name: flux-system
