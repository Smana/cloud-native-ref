---
# Envoy Gateway — prerequisite for the AI Gateway data plane. Provides
# the GatewayClass `envoy-gateway` (controllerName
# `gateway.envoyproxy.io/gatewayclass-controller`) which the AI
# Gateway's GatewayClass piggybacks on; coexists with Cilium's
# GatewayClasses (`cilium`, `cilium-tailscale`) for non-AI ingress.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  prune: true
  interval: 5m0s
  timeout: 5m0s
  path: ./infrastructure/base/envoy-gateway
  sourceRef:
    kind: ExternalArtifact
    name: infra-artifact
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: eks-mycluster-0-vars
  # Envoy Gateway installs with `crds: Skip` and relies on the always-on
  # `crds` Kustomization having pre-applied `crds/base/envoy-gateway/`.
  # Make the dependency explicit so a cold-start race doesn't surface as
  # "no matches for kind <Backend|EnvoyProxy|...>" on first reconcile.
  dependsOn:
    - name: crds
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: envoy-gateway
      namespace: envoy-gateway-system
