apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
spec:
  releaseName: tailscale-operator
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: tailscale-operator
      sourceRef:
        kind: HelmRepository
        name: tailscale
      version: "1.90.6"
  interval: 2m0s
  install:
    remediation:
      retries: 3
  values:
    # CRDs are managed separately via kustomize
    installCRDs: false

    operatorConfig:
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 300m
          memory: 256Mi

      # CONTAINER security context for the `operator` container
      # (`operatorConfig.podSecurityContext` is the pod one — see the chart's
      # templates/deployment.yaml). The chart ships both empty, so the operator
      # ran with privilege escalation allowed. The operator only talks to the
      # Kubernetes and Tailscale APIs; the tailscale *proxies* it creates are
      # separate pods governed by their own ProxyClass.
      securityContext:
        allowPrivilegeEscalation: false
