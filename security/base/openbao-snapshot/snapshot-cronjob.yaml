apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app.kubernetes.io/instance: openbao
  name: openbao-snapshot
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  schedule: "0 4 * * *"
  successfulJobsHistoryLimit: 1
  suspend: false
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/instance: openbao
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/instance: openbao
        spec:
          volumes:
            - name: snapshot
              persistentVolumeClaim:
                claimName: openbao-snapshot
          securityContext:
            fsGroup: 1001
            runAsUser: 1000
            runAsGroup: 1001
          containers:
            - command:
                - sh
                - -c
                - "openbao-snapshot.sh save -b $(BUCKET_NAME) -s /snapshot/backup.snap -a $(VAULT_ADDR) -d 8"
              env:
                # The CA cert should be added to the container image
                - name: "VAULT_SKIP_VERIFY"
                  value: "true"
              envFrom:
                - secretRef:
                    name: openbao-snapshot
              image: smana/openbao-snapshot:v0.1.0
              imagePullPolicy: IfNotPresent
              name: openbao-snapshot
              # Container-level context. The pod-level `securityContext` above
              # carries fsGroup/runAsUser/runAsGroup; allowPrivilegeEscalation is
              # only valid at container level. The job just calls the OpenBao API
              # and writes a snapshot to S3 — it never needs to escalate.
              securityContext:
                allowPrivilegeEscalation: false
              resources:
                limits:
                  cpu: 150m
                  memory: 150Mi
              volumeMounts:
                - mountPath: "/snapshot"
                  name: snapshot
          serviceAccountName: openbao-snapshot
          restartPolicy: Never
