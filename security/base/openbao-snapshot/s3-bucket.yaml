---
# `managementPolicies` without `Delete` — OpenBao raft snapshots are
# the disaster-recovery payload (KMS-encrypted, lifecycled to Glacier
# after 30d). Without this, Crossplane keeps trying `s3:DeleteBucket`
# on prune, AWS denies it (no DeleteBucket permission per CLAUDE.md "no
# deletion permissions for stateful services"), and the MR finalizer
# hangs the parent namespace's teardown. The encryption + lifecycle
# subresources below keep the default policy `["*"]` (includes Delete) —
# pure configuration that re-applies cheaply against the orphaned
# bucket on the next deploy. To intentionally remove the bucket, do it
# via aws CLI. (Crossplane v2 namespaced MRs do not expose
# `spec.deletionPolicy`; `managementPolicies` is the v2 mechanism.)
apiVersion: s3.aws.m.upbound.io/v1beta1
kind: Bucket
metadata:
  name: openbao-snapshot
  labels:
    cloud.ogenki.io/name: openbao-snapshot
  annotations:
    crossplane.io/external-name: ${region}-ogenki-openbao-snapshot
spec:
  managementPolicies: ["Observe", "Create", "Update", "LateInitialize"]
  forProvider:
    region: ${region}
---
apiVersion: s3.aws.m.upbound.io/v1beta1
kind: BucketServerSideEncryptionConfiguration
metadata:
  labels:
    cloud.ogenki.io/name: openbao-snapshot
  name: xplane-openbao-snapshot
spec:
  forProvider:
    bucketSelector:
      matchLabels:
        cloud.ogenki.io/name: openbao-snapshot
    region: ${region}
    rule:
      - applyServerSideEncryptionByDefault:
          kmsMasterKeyIdSelector:
            matchLabels:
              cloud.ogenki.io/name: openbao-snapshot
          sseAlgorithm: aws:kms
---
apiVersion: s3.aws.m.upbound.io/v1beta1
kind: BucketLifecycleConfiguration
metadata:
  labels:
    cloud.ogenki.io/name: openbao-snapshot
  name: xplane-openbao-snapshot
spec:
  forProvider:
    bucketSelector:
      matchLabels:
        cloud.ogenki.io/name: openbao-snapshot
    region: ${region}
    rule:
      - transition:
          - days: 30
            storageClass: GLACIER
        id: glacier
        status: Enabled
      - expiration:
          - days: 120
        id: expiration
        status: Enabled
