# golangci-lint v2 config for the app-wizard module.
# Run: golangci-lint run ./...  (from container-images/app-wizard)
version: "2"

run:
  timeout: 5m

linters:
  # v2 enables errcheck, govet, ineffassign, staticcheck and unused by default.
  enable:
    - misspell

formatters:
  enable:
    - gofmt
