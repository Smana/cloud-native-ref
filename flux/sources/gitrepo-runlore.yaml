apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: runlore
  namespace: runlore
spec:
  interval: 1h0m0s
  url: https://github.com/Smana/runlore.git
  # TEMPORARY — tracking main to validate the commits landed after v0.9.1:
  #   #322 redact: decode Secret data values and scrub them payload-wide
  #   #321 security: pin the Hubble Relay TLS floor to 1.2
  #   #320 coalesce: a standing 👎 bypasses the cooldown
  # Paired with the rolling `main` image tag in observability/base/runlore/helmrelease.yaml.
  # REVERT to a release tag once release-please cuts v0.9.2 (PR #323):
  #   ref.tag: v0.9.2  +  image.tag: "0.9.2"  (released image is multi-arch + signed;
  #   `main` is a single-arch amd64 validation build — fine on this amd64 cluster, not
  #   what we want pinned long-term).
  ref:
    branch: main
