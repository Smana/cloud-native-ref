apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: runlore
  namespace: runlore
spec:
  interval: 1h0m0s
  url: https://github.com/Smana/runlore.git
  # Pinned to main HEAD 1b3e8c4 — now includes #307 (feat: watch HelmReleases for
