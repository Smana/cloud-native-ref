apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: runlore
  namespace: runlore
spec:
  interval: 1h0m0s
  url: https://github.com/Smana/runlore.git
  # VALIDATION DEPLOY — pinned to main HEAD (commit 26723739, "fix(eval): … #374") to
  # validate every feature shipped since v0.10.0: D2 in-server curator sweeps (#370),
  # M1 LogsProvider (#372), M3 Argo executor (#371), D1 `lore kb import` (#369),
  # F1 OCI chart (#367), F2 nightly eval scorecard (#368).
  #
  # The chart (deploy/helm/runlore) is checked out from THIS commit, and the image tag in
  # observability/base/runlore/helmrelease.yaml is ":main" — the rolling single-arch
  # (amd64) build-image.yml build pushed 2.5 min after this commit — so chart + binary
  # stay in lockstep at the same SHA. NOT a release: there is no v0.11.0 tag yet, hence
  # commit-pin + :main instead of a version tag. `branch: main` lets source-controller
  # shallow-clone efficiently; `commit` takes precedence over it.
  ref:
    branch: main
    commit: 26723739d6fed97237e3ba5e2d667fe0b0aae10b  # pragma: allowlist secret (git SHA, not a secret)
