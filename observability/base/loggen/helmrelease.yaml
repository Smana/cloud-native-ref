apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loggen
spec:
  interval: 30m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: loggen
      version: "0.1.4"
      sourceRef:
        kind: HelmRepository
        name: loggen
      interval: 12h
  values:
    replicaCount: 2
    args:
      - --sleep
      - "0.1"
      - --error-rate
      - "0.1"
      - --format
      - "json"
      - --latency
      - "0.2"
    securityContext:
      runAsUser: 10001
      runAsGroup: 10001
      runAsNonRoot: true
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        cpu: 400m
        memory: 100Mi
  # Chart 0.1.4 hardcodes readOnlyRootFilesystem/allowPrivilegeEscalation/
  # capabilities at .spec.template.spec.securityContext (pod-level), where
  # K8s rejects them. Strip via postRenderers until upstream is fixed.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: loggen-loggen
            patch: |
              - op: remove
                path: /spec/template/spec/securityContext/readOnlyRootFilesystem
              - op: remove
                path: /spec/template/spec/securityContext/allowPrivilegeEscalation
              - op: remove
                path: /spec/template/spec/securityContext/capabilities
