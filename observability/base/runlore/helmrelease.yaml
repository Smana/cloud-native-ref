apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: runlore
spec:
  interval: 30m
  # First start is slow: the catalog git-sync warms the readyz gate, and on a
  # cold PVC two sync loops briefly race (one retries on the next interval), so
  # readiness can take up to ~one catalog.git.interval. Give Helm headroom and
  # retry instead of going terminally Stalled on a single timeout.
  timeout: 10m
  # disableWait was required before runlore#264: /readyz gated on leadership, so
  # standby replicas were permanently NotReady and Helm's --wait could never
  # succeed with replicaCount>1. #264 shipped (readyz decoupled from leadership,
  # followers forward work to the leader), so every replica reports Ready and
  # Flux's full health verification is back on — this deployment is the live
  # validation of exactly that.
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: deploy/helm/runlore
      # The GitRepository source is defined in flux/sources/gitrepo-runlore.yaml
      # (flux-sources Kustomization), NOT here under tooling. tooling stamps
      # sharding.fluxcd.io/key=apps via commonMetadata; the HelmChart the
      # helm-controller derives carries no shard label and is reconciled by the
      # default source-controller, which only caches non-apps-sharded sources.
      # An apps-sharded GitRepository would be invisible to it -> "source not found".
      sourceRef:
        kind: GitRepository
        name: runlore
      interval: 12h
      # Default reconcileStrategy (ChartVersion) only repackages when Chart.yaml's
      # version bumps — irrelevant here since we're pinned to an unreleased PR
      # branch commit (flux/sources/gitrepo-runlore.yaml) with no version bump.
      # Revision repackages whenever the GitRepository's observed commit changes,
      # which is what tracking an in-review branch actually needs.
      reconcileStrategy: Revision
  driftDetection:
    mode: enabled
  values:
    # StatefulSet (runlore#263) gives each replica its OWN RWO EBS volume via
    # volumeClaimTemplates — validated live (2 independently-Bound PVCs, correct
    # leader election/failover). replicaCount: 2 is live HA: BOTH replicas report
    # Ready (runlore#264 — readyz decoupled from leadership), the Service
    # round-robins, and a non-leader replica forwards work-bearing requests to
    # the leader via its routable Lease identity (<pod>_<podIP>).
    workloadKind: StatefulSet
    replicaCount: 2
    image:
      # VALIDATION DEPLOY: tracking runlore main HEAD (commit 26723739), which has no
      # release tag yet — so this uses the rolling ":main" tag from build-image.yml
      # (single-arch amd64; nodes are amd64 t3a.xlarge, so fine). It was pushed 2.5 min
      # after the commit flux/sources/gitrepo-runlore.yaml is pinned to, keeping chart +
      # binary in lockstep at that SHA. build_info then reads "main-<short-sha>".
      #
      # For a RELEASE deploy this MUST be the GoReleaser version tag instead (e.g.
      # "0.11.0", NO leading "v" — release-binaries.yml publishes `{{ .Version }}`; a `v`
      # prefix 404s into ImagePullBackOff) AND the GitRepository must move to the matching
      # tag. The two ALWAYS move together — a chart/image SHA split silently runs the
      # wrong binary behind the right chart with nothing failing to say so.
      tag: "main"
      # Mutable tag: on this fresh cluster the first pull fetches current :main = main
      # HEAD; kept IfNotPresent so a mid-validation pod reschedule reuses the cached image
      # rather than drifting if remote :main advances during the session.
      pullPolicy: IfNotPresent
    serviceAccount:
      create: true
      # Must match the SA bound by the xplane-runlore EKS Pod Identity (security/base/epis/runlore.yaml).
      name: runlore
    # fsGroup is required so the nonroot container (UID 65532, distroless) can
    # write the catalog git-sync mirror + outcome ledger on the EBS (ext4) PVC.
    # The chart's default podSecurityContext omits it (harmless on its default
    # RWX/EFS, but EBS RWO mounts root-owned -> "mkdir .git: permission denied").
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      fsGroup: 65532
      seccompProfile:
        type: RuntimeDefault
    # Writable git-sync mirror of the KB repo at the persistent mount, so the
    # read/write learning loop is closed (recall reads it; curation pushes PRs).
    catalog:
      gitSync: true
      mountPath: /var/lib/runlore/catalog
    persistence:
      enabled: true
      storageClass: gp3
      accessModes: ["ReadWriteOnce"]
      size: 1Gi
    rbac:
      create: true
      # Read-only: no patch rights on Flux resources. actions.mode stays off.
      allowActions: false
      actionNamespaces: []
    networkPolicy:
      enabled: true
      # Renders a CiliumNetworkPolicy allowing egress to the EKS Pod Identity
      # credential endpoint (169.254.170.23:80, host entity) — required on Cilium.
      awsPodIdentity: true
      # The chart's non-strict egress only opens 443/6443 — but VictoriaMetrics
      # (vmsingle :8428) and VictoriaLogs (:9428) listen on other ports, so without
      # this the agent's metrics/logs tool calls hang until they time out, starving
      # every investigation of those signals (and burning the per-investigation
      # deadline half-blind). Open egress to the observability namespace on both.
      extraEgress:
        - to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: observability
          ports:
            - port: 8428   # VictoriaMetrics (vmsingle) — metrics.url
              protocol: TCP
            - port: 9428   # VictoriaLogs — logs.url
              protocol: TCP
    vmServiceScrape:
      enabled: true
      interval: 30s
      path: /metrics
    # Secret-backed env (GEMINI_API_KEY, GITHUB_APP_PRIVATE_KEY) from the
    # runlore-credentials ExternalSecret. RunLore never inlines credentials.
    envFrom:
      - secretRef:
          name: runlore-credentials
      - secretRef:
          name: runlore-slack
      - secretRef:
          name: runlore-webhook
    # Rendered verbatim into /etc/runlore/runlore.yaml (strict-parsed by the agent).
    config:
      gitops:
        engine: flux
      # Source enablement (runlore v0.5.0+): presence of a key under `sources`
      # turns that source on; its value is the source's own config. Enablement
      # moved here out of the old `triggers.<name>.enabled: true` flags.
      sources:
        alertmanager: {}      # Alertmanager/VMAlert webhook source
        gitops:
          enabled: true       # also react to Flux Ready=False
      triggers:
        # `triggers.<name>` now holds match/dedup/debounce POLICY only; enablement
        # lives under `sources` above.
        incidents:
          match:
            severity: [critical]
          dedup:
            window: 30m
      investigation:
        # Per-investigation deadline (default 10m). Bumped to 15m as headroom for the
        # slower self-hosted model; the real latency fix is model.effort: low below.
        timeout: 15m
        # Recurrence cooldown (runlore#270): a trigger answered CONCLUSIVELY less
        # than this long ago is not re-investigated — no model call, no duplicate
        # notification. Complements dedup above: dedup keys on the alert
        # fingerprint (same firing series), this keys on the TriggerKey (same
        # incident identity across re-fires/resolves). Human-deferential: an
        # inconclusive verdict always retries, and a standing 👎 on the previous
        # answer re-arms investigation immediately. Requires outcome.ledger_path.
        recurrence_cooldown: 30m
        # gitops_failures policy left at defaults (debounce 60s); enablement is
        # via sources.gitops above.
      leader_election:
        enabled: true
        name: runlore-leader
      logging:
        format: json
        level: info
      notify:
        slack:
          bot_token_env: SLACK_BOT_TOKEN  # pragma: allowlist secret
          channel: "#alerts"
          # Interactivity: Slack posts button clicks to the public gateway route
          # (httproute.yaml, POST /slack/interactions only) and every request is
          # HMAC-verified with this secret. feedback_buttons is the opt-in human
          # feedback loop (👍/👎 → outcome ledger → recall trust + recurrence
          # cooldown re-arm). Slack-app side: set the Interactivity Request URL to
          # https://runlore.<domain>/slack/interactions.
          signing_secret_env: SLACK_SIGNING_SECRET  # pragma: allowlist secret
          feedback_buttons: true
      telemetry:
        metrics_enabled: true
      model:
        # GLM 5.2 via Z.ai's OpenAI-compatible API. Any provider name other than
        # anthropic/gemini falls back to the OpenAI wire protocol (NewModelClient),
        # so provider: openai + base_url is the correct way to point at it.
        provider: openai
        model: glm-5.2
        base_url: https://api.z.ai/api/paas/v4/
        api_key_env: GLM_API_KEY  # pragma: allowlist secret
        # Cap GLM 5.2's per-call reasoning depth. Unset, GLM runs its default (deep)
        # thinking every call → ~29s/call baseline and occasional multi-minute runaway
        # turns; a first live investigation burned the full 10m deadline at confidence:0
        # with 471s of the 600s spent purely in model inference (tools were <0.2s each,
        # 92% prompt-cache hit — the model was the bottleneck, not the tool count). For
        # the openai wire protocol runlore maps effort → reasoning_effort
        # (minimal|low|medium|high). low keeps enough reasoning to converge while cutting
        # per-call latency and preventing runaway turns.
        effort: low
      catalog:
        dir: /var/lib/runlore/catalog
        git:
          url: https://github.com/Smana/runlore-kb
          branch: main
          interval: 5m
        # Instant recall: short-circuit the investigation loop when the catalog
        # has a high-confidence match (the learning payoff). Off by default — must
        # be enabled. Thresholds are BM25-corpus-dependent; tune from the
        # recall_score / recall_rejections metrics. Recall is auto-disabled under
        # actions.mode=auto (poison-safety); harmless here (mode=off).
        instant_recall:
          enabled: true
          # The LLM reranker (ON by default, runlore#294) gates the short-circuit on a
          # CALIBRATED 0-1 match confidence, not an absolute BM25 magnitude — so the
          # BM25 solo_floor/min_score/margin_gap NO LONGER need per-corpus tuning and
          # are left at their defaults. (Previously this cluster hand-tuned solo_floor
          # to 0.2 because label-derived Alertmanager queries score ~0.1-0.3, an order
          # of magnitude below the default 4.0 — the reranker removes that need.)
          # The reranker routes to model.verify when set (here the main model), costs
          # ~1-2k tokens, and fires on rerank_threshold 0.7. outcome_floor keeps the
          # decay gate (a recall that never resolves is rejected).
          outcome_prior: 2.0
          outcome_floor: 0.5
      outcome:
        ledger_path: /var/lib/runlore/catalog/outcomes.jsonl
      # D2 (runlore#370) in-server curator sweeps: the LEADER replica runs the KB
      # grooming passes on a timer — no CronJob, no shared ledger volume (it reads the
      # pod's live outcome ledger above). mode: dry-run is the safe posture: every
      # candidate action is logged, nothing is written to the KB forge until mode: apply.
      # Both mode: dry-run and interval: 6h are the chart defaults — stated explicitly
      # here for auditability. (Validated 2026-07-24 at interval 10m; restored to 6h.)
      curate:
        sweeps:
          mode: dry-run
          interval: 6h
      forge:
        kb_repo: Smana/runlore-kb
        base_branch: main
        # Don't draft a KB PR for a benign "no action needed" conclusion — the finding
        # still delivers to Slack, only the repo artifact is suppressed. Shipped in
        # #256 specifically because pilot data showed 72% of drafted PRs over 6 days
        # were closed as noise (benign infra churn, synthetic canaries, near-dupes).
        skip_verdicts: [no_action]
        github_app:
          app_id: 4106804
          installation_id: 141652301
          private_key_env: GITHUB_APP_PRIVATE_KEY  # pragma: allowlist secret
      cloud:
        provider: aws
        region: eu-west-3
        cluster_name: mycluster-0
      # actions: omitted -> mode "off" (fully read-only on the cluster; only
      # writes are KB PRs/issues on Smana/runlore-kb via the GitHub App).
      # v0.2.0 fails closed (RequireWebhookAuth): with a model configured the
      # alert webhook MUST be authenticated, since alert labels/annotations flow
      # into the LLM prompt and bill the model. The bearer token comes from the
      # runlore-webhook ExternalSecret (envFrom above); the Alertmanager runlore
      # receiver posts it via authorization.credentials_file
      # (observability/.../vm-common-helm-values-configmap.yaml).
      server:
        webhook_token_env: WEBHOOK_TOKEN  # pragma: allowlist secret
      # Investigation signals — enable the query_metrics / query_metrics_range /
      # query_logs tools so investigations correlate the GitOps change against live
      # saturation + application logs (multi-source RCA), not just k8s object state.
      metrics:
        url: http://vmsingle-victoria-metrics-k8s-stack.observability.svc:8428
      logs:
        url: http://victoria-logs-victoria-logs-single-server.observability.svc:9428
      # network: deferred (needs a Hubble/flow-log provider choice).
