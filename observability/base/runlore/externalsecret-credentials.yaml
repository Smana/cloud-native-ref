apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: runlore-credentials
spec:
  # AWS Secrets Manager JSON object runlore/credentials holds:
  #   GLM_API_KEY             - model.api_key_env (GLM 5.2 via Z.ai, OpenAI-compatible)
  #   GEMINI_API_KEY          - unused since the GLM switch; kept for rollback
  #   GITHUB_APP_PRIVATE_KEY  - forge.github_app.private_key_env (PEM, mints 1h tokens)
  # extract maps each JSON key to a Secret key of the same name; the Deployment
  # then injects them as env vars via envFrom (see helmrelease.yaml).
  dataFrom:
    - extract:
        conversionStrategy: Default
        key: runlore/credentials
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: clustersecretstore
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: runlore-credentials
