# Slack interactivity callback — the ONLY publicly-routed runlore endpoint.
# Slack posts 👍/👎 feedback clicks (and, if approve mode is ever enabled,
# Approve/Reject) as HTTPS callbacks from Slack's servers; the app verifies every
# request against the signing secret (HMAC, ±5min replay window) before acting.
# Anything else on this hostname — /webhook/alertmanager, /metrics, /actions/* —
# deliberately has NO route: the gateway answers 404. In-cluster senders keep
# using the ClusterIP service directly.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: runlore-slack
spec:
  parentRefs:
    - name: platform-public
      namespace: infrastructure
  hostnames:
    - "runlore.${domain_name}"
  rules:
    - matches:
        - path:
            type: Exact
            value: /slack/interactions
          method: POST
      backendRefs:
        - name: runlore
          port: 8080
