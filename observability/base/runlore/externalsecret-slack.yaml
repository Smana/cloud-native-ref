apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: runlore-slack
spec:
  # AWS Secrets Manager JSON object runlore/slack-app holds SLACK_BOT_TOKEN
  # (notify.slack.bot_token_env — posts findings to #alerts via chat.postMessage)
  # and SLACK_SIGNING_SECRET (notify.slack.signing_secret_env — HMAC-verifies the
  # interactivity callbacks on /slack/interactions; add the key to the SM object,
  # dataFrom.extract picks it up). Until the key exists, the interactions endpoint
  # stays 404 (fail-closed) and the feedback buttons are inert.
  dataFrom:
    - extract:
        conversionStrategy: Default
        key: runlore/slack-app
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: clustersecretstore
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: runlore-slack
