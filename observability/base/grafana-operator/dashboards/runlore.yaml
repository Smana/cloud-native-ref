            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 12,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 7
          },
          "id": 11,
          "options": {
            "legend": {
              "calcs": [
                "mean",
                "lastNotNull"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(runlore_alerts_received_total[$$__rate_interval]))",
              "legendFormat": "received",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(runlore_alerts_coalesced_total[$$__rate_interval]))",
              "legendFormat": "coalesced",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$${datasource}"
              },
              "editorMode": "code",
              "expr": "sum(rate(runlore_alerts_suppressed_total[$$__rate_interval]))",
              "legendFormat": "suppressed",
              "refId": "C"
            }
          ],
          "title": "Alert intake rate",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 15
          },
          "id": 20,
          "panels": [],
          "title": "Investigations",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "$${datasource}"
          },
