              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$${datasource}"
              },
              "editorMode": "code",
              "expr": "sum by (result) (rate(runlore_investigations_completed_total[$$__rate_interval]))",
              "legendFormat": "{{result}}",
              "refId": "A"
