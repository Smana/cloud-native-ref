            {
              "datasource": {
                "type": "prometheus",
                "uid": "$${datasource}"
              },
              "editorMode": "code",
              "expr": "histogram_quantile(0.99, sum(rate(runlore_investigation_duration_seconds_bucket[$$__rate_interval])) by (le))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "title": "Investigation duration (p50 / p95 / p99)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "$${datasource}"
          },
          "description": "Completed investigations by result.",
          "fieldConfig": {
