apiVersion: cloud.ogenki.io/v1alpha1
kind: KVStore
metadata:
  name: xplane-oncall
  namespace: "observability"
spec:
  size: nano
  # Broker/cache semantics: standalone, ephemeral (SPEC-012 CL-2/CL-4).
  # Password for the "default" ACL user (OnCall's externalRedis username).
  auth:
    existingSecret: oncall-valkey # pragma: allowlist secret — checkov:skip=CKV_SECRET_6 secret name, not a value
    passwordKey: password # pragma: allowlist secret
