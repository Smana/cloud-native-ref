# Based on https://grafana.com/docs/grafana-oncall/latest/setup/install/helm/install-scalable/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oncall
spec:
  releaseName: oncall
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: oncall
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
      version: "1.16.5"
  interval: 5m0s
  timeout: 15m
  install:
    remediation:
      retries: 3
  values:
    base_url: oncall.${private_domain_name}
    base_url_protocol: https

    # --- Container security contexts -----------------------------------------
    # This chart ships all three of these empty, so every container ran with
    # privilege escalation allowed. Three separate keys are needed because three
    # different container sets are involved (verified against the chart templates):
    #
    #   securityContext                     -> the `oncall` container in the engine
    #                                          and celery Deployments, and in the
    #                                          engine-migrate Job
    #                                          (engine/deployment.yaml, celery/deployment.yaml,
    #                                           engine/job-migrate.yaml)
    #   init.securityContext                -> the `wait-for-db` initContainer
    #                                          (_helpers.tpl "oncall.initContainer")
    #   grafana.initChownData.securityContext -> the bundled grafana subchart's
    #                                          `init-chown-data` initContainer
    #
    # All three are CONTAINER-level contexts (`podSecurityContext` is the pod one).
    securityContext:
      allowPrivilegeEscalation: false

    init:
      securityContext:
        allowPrivilegeEscalation: false

    grafana:
      # Merged with the chart default (runAsUser: 0 + CHOWN capability), which this
      # initContainer needs to chown the Grafana PVC. Forbidding *escalation* does
      # not remove the capability it already holds, so the chown still works.
      initChownData:
        securityContext:
          allowPrivilegeEscalation: false

    engine:
      replicaCount: 1
      resources:
        limits:
          cpu: 500m
          memory: 768Mi

    celery:
      replicaCount: 1
      resources:
        limits:
          cpu: 300m
          memory: 516Mi

    oncall:
      secrets:
        existingSecret: "grafana-oncall"
        secretKey: "secret_key"
        mirageSecretKey: "mirage_secret_key"
      slack:
        enabled: true
        existingSecret: "oncall-slack-app"
        clientIdKey: "client_id"
        clientSecretKey: "client_secret"
        signingSecretKey: "signing_secret"

    ingress:
      enabled: false

    ingress-nginx:
      enabled: false

    cert-manager:
      enabled: false

    database:
      type: postgresql

    mariadb:
      enabled: false

    externalPostgresql:
      host: xplane-oncall-cnpg-cluster-rw
      port: 5432
      db_name: "oncall"
      user: "oncall"
      existingSecret: "xplane-oncall-cnpg-role-oncall"
      passwordKey: "password"

    rabbitmq:
      enabled: false

    externalRabbitmq:
      host: oncall-rabbitmq
      port: 5672
      existingSecret: oncall-rabbitmq
      passwordKey: "password"
      usernameKey: "username"

    redis:
      enabled: false

    externalRedis:
      # KVStore claim `xplane-oncall` (SPEC-012)
      host: xplane-oncall-valkey
      port: 6379
      username: default
      existingSecret: "oncall-valkey"
      passwordKey: password

    externalGrafana:
      url: https://grafana.${private_domain_name}

    networkPolicy:
      enabled: false
