# gateway-api-inference-extension CRDs (InferencePool, InferenceObjective).
# Required by the AI gateway redesign Phase 4 — see design §2 component map.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crds-inference-extension
  namespace: kube-system
spec:
  interval: 10m
  targetNamespace: kube-system
  sourceRef:
    kind: GitRepository
    name: gateway-api-inference-extension
  path: "./config/crd/bases"
  prune: true
  timeout: 1m
