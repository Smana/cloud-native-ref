name: Archive Spec on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  archive:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python (for SUMMARY generator)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Locate spec directory referenced by PR
        id: locate
        run: |
          # Match docs/specs/NNN-slug (case-insensitive). Skip if the PR doesn't reference one.
          SPEC_DIR=$(echo "${{ github.event.pull_request.body }}" | grep -oE 'docs/specs/[0-9]+-[a-z0-9-]+' | head -1 || true)

          if [ -z "$SPEC_DIR" ]; then
            echo "No spec directory found in PR body — skipping archive."
            echo "archive=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -d "$SPEC_DIR" ]; then
            echo "Spec directory $SPEC_DIR not present at HEAD — likely already archived. Skipping."
            echo "archive=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SPEC_NAME=$(basename "$SPEC_DIR")
          # Quarterly bucket: YYYY-Qn (1..4) based on the merge timestamp.
          MONTH=$(date -u +%-m)
          QUARTER=$(( (MONTH - 1) / 3 + 1 ))
          QUARTER_DIR="docs/specs/done/$(date -u +%Y)-Q${QUARTER}"
          ARCHIVE_DIR="${QUARTER_DIR}/${SPEC_NAME}"

          {
            echo "archive=true"
            echo "spec_dir=$SPEC_DIR"
            echo "spec_name=$SPEC_NAME"
            echo "quarter_dir=$QUARTER_DIR"
            echo "archive_dir=$ARCHIVE_DIR"
          } >> "$GITHUB_OUTPUT"

      - name: Generate SUMMARY.md (in active spec, before move)
        if: steps.locate.outputs.archive == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/sdd/generate-summary.sh
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          BASE_SHA=$(git merge-base "$MERGE_SHA" "${{ github.event.pull_request.base.sha }}" || echo "${{ github.event.pull_request.base.sha }}")
          ./scripts/sdd/generate-summary.sh "${{ steps.locate.outputs.spec_dir }}" "$PR_NUM" "$MERGE_SHA" "$BASE_SHA" || {
            echo "::warning::SUMMARY generation failed; continuing without it"
          }

      - name: Move spec into quarterly archive bucket
        if: steps.locate.outputs.archive == 'true'
        run: |
          mkdir -p "${{ steps.locate.outputs.quarter_dir }}"
          # If a directory with the same slug already exists in the bucket, append the merge SHA to disambiguate.
          if [ -d "${{ steps.locate.outputs.archive_dir }}" ]; then
            ARCHIVE_DIR="${{ steps.locate.outputs.archive_dir }}-${{ github.event.pull_request.merge_commit_sha }}"
            echo "Bucket already has ${{ steps.locate.outputs.spec_name }} — using $ARCHIVE_DIR"
            git mv "${{ steps.locate.outputs.spec_dir }}" "$ARCHIVE_DIR"
          else
            git mv "${{ steps.locate.outputs.spec_dir }}" "${{ steps.locate.outputs.archive_dir }}"
          fi

      - name: Commit archive (SUMMARY + move)
        if: steps.locate.outputs.archive == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/specs/
          if git diff --cached --quiet; then
            echo "No changes to commit (already archived?)"
            exit 0
          fi

          git commit -m "chore(sdd): archive ${{ steps.locate.outputs.spec_dir }} → ${{ steps.locate.outputs.archive_dir }}

          Auto-generated by spec-archive.yaml after PR #${{ github.event.pull_request.number }} merged.
          Includes SUMMARY.md generated from PR + git metadata."
          git push

      - name: Close linked issue
        if: steps.locate.outputs.archive == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM=$(echo "${{ github.event.pull_request.body }}" | grep -oP '(?:Implements |Closes |Fixes |#)\K\d+' | head -1 || true)
          if [ -z "$ISSUE_NUM" ]; then
            ISSUE_NUM=$(gh issue list --label "spec" --json number,body \
              --jq ".[] | select(.body | contains(\"${{ steps.locate.outputs.spec_name }}\")) | .number" \
              | head -1 || true)
          fi

          if [ -n "$ISSUE_NUM" ]; then
            COMMENT="Implemented in PR #${{ github.event.pull_request.number }}. Spec archived to \`${{ steps.locate.outputs.archive_dir }}/\` (with auto-generated SUMMARY.md)."
            gh issue close "$ISSUE_NUM" --comment "$COMMENT" --reason "completed" \
              || echo "Could not close issue (may already be closed)"
            gh issue edit "$ISSUE_NUM" \
              --remove-label "spec:draft" --remove-label "spec:implementing" \
              --add-label "spec:done" 2>/dev/null \
              || echo "Could not update labels"
          else
            echo "No linked issue found to close"
          fi
