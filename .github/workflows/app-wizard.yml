name: App Wizard

# Go lint + tests (incl. the schema drift guard) and the UI build/tests for the
# App Wizard. Path-filtered so it only runs when the wizard changes.
on:
  push:
    branches: [main]
    paths:
      - 'container-images/app-wizard/**'
      - '.github/workflows/app-wizard.yml'
  pull_request:
    paths:
      - 'container-images/app-wizard/**'
      - '.github/workflows/app-wizard.yml'

permissions:
  contents: read

concurrency:
  group: app-wizard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: container-images/app-wizard
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: container-images/app-wizard/go.mod
          cache-dependency-path: container-images/app-wizard/go.sum
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...
      # Runs the schema drift guard (TestUIHintsNoDriftFromXRD) which reads the
      # App XRD from the repo — so UI field references can never drift from the
      # Crossplane schema without failing CI.
      - name: go test
        run: go test ./...

  ui:
    name: UI build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: container-images/app-wizard/ui
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: container-images/app-wizard/ui/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
