name: CI

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  pre-commit:
    name: Pre-commit checks 🛃
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Write required openbao files
        run: |
          mkdir -p opentofu/openbao/cluster/.tls
          echo 'keep' > opentofu/openbao/cluster/.tls/openbao.pem
          echo 'keep' > opentofu/openbao/cluster/.tls/openbao-key.pem
          echo 'keep' > opentofu/openbao/cluster/.tls/ca-chain.pem

      - name: Validate Opentofu configuration
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "latest"
          verb: call
          module: github.com/Smana/daggerverse/pre-commit-tf@pre-commit-tf/v0.1.2
          args: run --dir "." --tf-binary="tofu"

  security-scan:
    name: Security scanning 🔒
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Checkov static analysis
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          quiet: true
          soft_fail: true
          framework: terraform,secrets
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload Checkov scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-results.sarif

      - name: Detect secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  kubernetes-validation:
    name: Kubernetes validation ☸
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install tools
        uses: jdx/mise-action@v2

      - name: Install the flux-schema plugin
        run: flux plugin install schema

      # render-bundle.py parses every rendered document; PyYAML happens to ship
      # in the runner image today, but that is not a dependency declaration.
      - name: Install Python dependencies
        run: python3 -m pip install --quiet --disable-pip-version-check pyyaml

      - name: Install Polaris
        uses: fairwindsops/polaris/.github/actions/setup-polaris@master
        with:
          version: '8.5.0'

      # Charts are version-pinned, so only the download layer is cached (CL-2).
      # The bundle itself is always rendered fresh — a stale bundle is a
      # silently-wrong green, the exact failure class SPEC-007 removes.
      - name: Cache Helm chart downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/helm
          key: helm-${{ hashFiles('**/helmrelease.yaml', 'flux/sources/**') }}
          restore-keys: helm-

      - name: Validate manifests (flux schema + polaris)
        run: ./scripts/validate-manifests.sh

  shellcheck:
    name: Check the shell scripts 💻
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: |
          find ./scripts -name "*.sh" -type f -print0 | xargs -0 shellcheck -x -S warning
